<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventLog Preview</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* === component.css (inline - #event-log-container scoped) === */
        #event-log-container {
            min-width: 800px;
            min-height: 100px;
        }

        #event-log-container .bottom-log {
            width: 100%;
            height: 100%;

        #event-log-container .log-header {
            height: 48px;

            flex-shrink: 0;

        #event-log-container .toggle-pill {

        #event-log-container .toggle-pill .auto-label {

            white-space: nowrap;
        }

        #event-log-container .toggle-switch {
            width: 40px;
            height: 20px;
            border-radius: 62.5px;
            position: relative;
            overflow: clip;
            padding: 2.5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;

        }

        #event-log-container .toggle-switch-bg {
            position: absolute;

            border-radius: 62.5px;
            background:
                linear-gradient(-12.37deg, rgba(96, 235, 255, 0) 9.76%, rgb(96, 255, 234) 93.85%),

                linear-gradient(90deg, rgb(175, 238, 247) 0%, rgb(175, 238, 247) 100%);

        }

        #event-log-container .toggle-switch-overlay {
            position: absolute;
            inset: 0;
            border-radius: 62.5px;
            background: rgba(208, 208, 208, 0.5);
            mix-blend-mode: color-burn;
            pointer-events: none;
        }

        #event-log-container .toggle-knob {
            width: 15px;
            height: 15px;
            border-radius: 100px;
            background: #fff;

            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        #event-log-container .toggle-switch-inset {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow:
                inset 0px -0.313px 0.625px 0px rgba(94, 94, 94, 0.3),
                inset 0px -0.313px 0.625px 0px rgba(255, 255, 255, 0.2),
                inset 0px 1.875px 1.875px 0px rgba(128, 128, 128, 0.18),
                inset 0px 1.875px 1.875px 0px rgba(0, 0, 0, 0.15);

        #event-log-container .btn-expand {
            width: 30px;
            height: 30px;
            border-radius: 78.947px;
            border: 1px solid #60ebff;
            background:
                linear-gradient(90deg, rgba(144, 161, 185, 0.1) 0%, rgba(144, 161, 185, 0.1) 100%),
                linear-gradient(90deg, rgba(33, 38, 50, 0.7) 0%, rgba(33, 38, 50, 0.7) 100%);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: clip;
            padding: 1px;
            flex-shrink: 0;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #event-log-container .btn-expand .icon-expand {
            width: 16.364px;
            height: 16.364px;
            display: block;
        }

        #event-log-container .header-right {
            display: flex;
            align-items: center;
            gap: 9.871px;
        }

        #event-log-container .action-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #event-log-container .btn-action {
            width: 54px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #1e222d;
            cursor: pointer;
        }

        #event-log-container .btn-action span {
            font-weight: 400;
            font-size: 15px;
            color: #94a3b8;
            text-align: center;
            white-space: nowrap;
        }

        #event-log-container .status-items {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #event-log-container .status-item {
            width: 78px;
            height: 31px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            cursor: pointer;
            transition: opacity 0.15s, border-color 0.15s, background 0.15s;
        }

        #event-log-container .status-item.filter-inactive { opacity: 0.3; }

        #event-log-container .status-item.filter-active.critical { border-color: var(--critical, #f43130); background: rgba(244, 49, 48, 0.15); }
        #event-log-container .status-item.filter-active.major    { border-color: var(--major, #fd8004);    background: rgba(253, 128, 4, 0.15); }
        #event-log-container .status-item.filter-active.minor    { border-color: var(--minor, #fccf1e);    background: rgba(252, 207, 30, 0.15); }
        #event-log-container .status-item.filter-active.warning  { border-color: var(--warning, #28e3ff);  background: rgba(40, 227, 255, 0.15); }
        #event-log-container .status-item.filter-active.normal   { border-color: var(--normal, #34d28d);   background: rgba(52, 210, 141, 0.15); }

        #event-log-container .status-dot {

        #event-log-container .status-dot.major    { background: var(--major, #fd8004);    box-shadow: 0px 0px 6px 0px var(--major, #fd8004); }
        #event-log-container .status-dot.minor    { background: var(--minor, #fccf1e);    box-shadow: 0px 0px 6px 0px var(--minor, #fccf1e); }
        #event-log-container .status-dot.warning  { background: var(--warning, #28e3ff);  box-shadow: 0px 0px 6px 0px var(--warning, #28e3ff); }
        #event-log-container .status-dot.normal   { background: var(--normal, #34d28d);   box-shadow: 0px 0px 6px 0px var(--normal, #34d28d); }

        #event-log-container .status-item .count {

        #event-log-container .table-header {

            border-bottom: 1.234px solid rgba(255, 255, 255, 0.05);
            display: flex;

        #event-log-container .th-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: stretch;
            flex-shrink: 0;

            font-size: 15px;
            color: #d8dbdf;

        #event-log-container .th-asset-id   { width: 140px; }
        #event-log-container .th-location   { width: 120px; }

        #event-log-container .table-row:hover { background: rgba(255, 255, 255, 0.03); }

        #event-log-container .td-cell {

        #event-log-container .td-grade      { width: 36px; }
        #event-log-container .td-asset-id   { width: 140px; }
        #event-log-container .td-location   { width: 120px; }
        #event-log-container .td-first-time { width: 200px; }
        #event-log-container .td-last-time  { width: 200px; }
        #event-log-container .td-group      { width: 120px; }
        #event-log-container .td-message    { flex: 1; min-width: 0; justify-content: flex-start; padding-left: 20px; }

        #event-log-container .row-dot {
            width: 8px;

        #event-log-container .row-dot.critical { background: var(--critical, #f43130); box-shadow: 0px 0px 4px 0px var(--critical, #f43130); }
        #event-log-container .row-dot.major    { background: var(--major, #fd8004);    box-shadow: 0px 0px 4px 0px var(--major, #fd8004); }
        #event-log-container .row-dot.minor    { background: var(--minor, #fccf1e);    box-shadow: 0px 0px 4px 0px var(--minor, #fccf1e); }
        #event-log-container .row-dot.warning  { background: var(--warning, #28e3ff);  box-shadow: 0px 0px 4px 0px var(--warning, #28e3ff); }
        #event-log-container .row-dot.normal   { background: var(--normal, #34d28d);   box-shadow: 0px 0px 4px 0px var(--normal, #34d28d); }

        #event-log-container .text-default {
            font-weight: 400;
            font-size: 14px;
            color: #94a3b8;
            white-space: nowrap;
        }

        #event-log-container .text-time {
            font-family: 'Roboto Mono', monospace;
            font-weight: 400;
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: -0.8px;
            white-space: nowrap;
        }

        #event-log-container .row-selected .text-default { font-weight: 500; color: #f8fafc; }
        #event-log-container .row-selected .text-time    { font-weight: 500; color: #f8fafc; }
        #event-log-container .row-alt .text-default      { color: #f8fafc; }
        #event-log-container .row-alt .text-time         { color: #f8fafc; }
        #event-log-container .row-acked .row-dot         { opacity: 0.35; }
        #event-log-container .row-acked .text-default    { color: #475569; }
        #event-log-container .row-acked .text-time       { color: #475569; }

        #event-log-container .row-actions {
            display: flex;
            align-items: center;
            gap: 9.871px;
            height: 28.785px;
            flex-shrink: 0;
        }

        #event-log-container .btn-new {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;

            background: rgba(96, 235, 255, 0.2);

        }

        #event-log-container .btn-new span { font-weight: 400; font-size: 12px; color: #60ebff; white-space: nowrap; }

        #event-log-container .btn-row-action {

        }

        #event-log-container .btn-row-action .icon-cctv { width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #event-log-container .btn-row-action .icon-cctv img { width: 10.286px; height: 9.144px; display: block; }

        #event-log-container .table-body::-webkit-scrollbar { width: 4px; }
        #event-log-container .table-body::-webkit-scrollbar-track { background: transparent; }
        #event-log-container .table-body::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.4); border-radius: 2px; }


        /* === preview-specific === */
        body {
            margin: 0;
            padding: 40px;
            background: #0f1117;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        h1 { color: #f8fafc; margin-bottom: 24px; font-size: 20px; }
        #event-log-container { width: 1880px; height: 300px; }
        .controls { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap; }

            padding: 8px 16px;
            background: #60ebff;

            cursor: pointer;

        }

        .controls button.destroy { background: #f87171; color: #fff; }

</head>
<body>
    <h1>EventLog Component Preview</h1>
    <div id="event-log-container"></div>
    <div class="controls">
        <button onclick="sendMockData()">Load Data</button>
        <button onclick="selectRow3()" class="secondary">Select Row 3</button>
        <button onclick="destroy()" class="destroy">Destroy</button>
    </div>

    <script>
        // ======================
        // MOCK CONTEXT
        // ======================

        const mockThis = {
            appendElement: document.getElementById('event-log-container')
        };

        // HTML 삽입 (views/component.html 내용)
        mockThis.appendElement.innerHTML = `
            <div class="bottom-log">
                <div class="log-header">
                    <div class="header-left">
                        <span class="log-title">-</span>
                        <div class="header-divider"></div>
                        <div class="sound-group">
                            <button class="sound-btn">
                                <img src="./assets/icon-volume.svg" class="icon-volume" alt="">
                                <span>소리 알림</span>
                            </button>
                            <div class="toggle-pill">
                                <span class="auto-label">AUTO</span>
                                <div class="toggle-switch">
                                    <div class="toggle-switch-bg"></div>
                                    <div class="toggle-switch-overlay"></div>
                                    <div class="toggle-knob"></div>
                                    <div class="toggle-switch-inset"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button class="btn-expand">
                        <img src="./assets/icon-expand.svg" class="icon-expand" alt="">
                    </button>
                    <div class="header-right">
                        <div class="action-buttons">
                            <button class="btn-action btn-ack"><span>Ack</span></button>
                            <button class="btn-action btn-all"><span>All</span></button>
                        </div>
                        <div class="right-divider"></div>
                        <div class="status-items"></div>
                    </div>
                </div>
                <div class="table-header"></div>
                <div class="table-body"></div>
            </div>
        `;

        // ======================
        // MOCK DEPENDENCIES
        // ======================

        const GlobalDataPublisher = {
            subscribe: (topic, context, fn) => {
                console.log(`[Mock] subscribe: ${topic}`);
            },
            unsubscribe: (topic, context) => {
                console.log(`[Mock] unsubscribe: ${topic}`);
            }
        };

        const Wkit = {
            bindEvents: (context, events) => {
                console.log('[Mock] bindEvents:', events);
            },
            removeCustomEvents: (context, events) => {
                console.log('[Mock] removeCustomEvents:', events);
            }
        };

        const fx = {
            go: (arr, ...fns) => fns.reduce((acc, fn) => fn(acc), arr),
            each: fn => arr => { arr.forEach(fn); return arr; }
        };

        // ======================
        // REGISTER (scripts/register.js - TBD를 실제 값으로 변경)
        // ======================

        (function register() {
            const { subscribe } = GlobalDataPublisher;
            const { bindEvents } = Wkit;

            // CONFIG (TBD → 실제 값)
            const config = {
                titleKey: 'title',
                summaryKey: 'summary',
                columnsKey: 'columns',
                eventsKey: 'events',
                eventFields: {
                    level: 'level',
                    assetId: 'assetId',
                    location: 'location',
                    firstTime: 'firstTime',
                    lastTime: 'lastTime',
                    group: 'group',
                    message: 'message',
                    isNew: 'isNew'
                },
                summaryOrder: ['critical', 'major', 'minor', 'warning', 'normal'],
                columnClasses: {
                    level: 'td-grade',
                    assetId: 'td-asset-id',
                    location: 'td-location',
                    firstTime: 'td-first-time',
                    lastTime: 'td-last-time',
                    group: 'td-group',
                    message: 'td-message'
                },
                headerClasses: {
                    level: 'th-grade',
                    assetId: 'th-asset-id',
                    location: 'th-location',
                    firstTime: 'th-first-time',
                    lastTime: 'th-last-time',
                    group: 'th-group',
                    message: 'th-message'
                },
                timeFields: ['firstTime', 'lastTime']
            };

            // STATE
            this._selectedRowIndex = null;
            this._selectedEvent = null;
            this._eventsData = null;
            this._internalHandlers = {};
            this._activeFilters = new Set();

            // BINDINGS
            this.renderData = renderData.bind(this, config);
            this.selectRow = selectRow.bind(this, config);

            // SUBSCRIPTIONS
            this.subscriptions = {
                eventLogData: ['renderData']
            };

            fx.go(
                Object.entries(this.subscriptions),
                fx.each(([topic, fnList]) =>
                    fx.each(fn => this[fn] && subscribe(topic, this, this[fn]), fnList)
                )
            );

            // EVENT BINDING
            this.customEvents = {
                click: {
                    '.table-row': '@rowClicked',
                    '.btn-ack': '@ackClicked',
                    '.btn-all': '@allClicked',
                    '.btn-expand': '@expandClicked',
                    '.sound-btn': '@soundToggled'
                }
            };

            bindEvents(this, this.customEvents);

            setupInternalHandlers.call(this);

            // RENDER FUNCTIONS

            function renderData(config, { response }) {
                const { data } = response;
                if (!data) return;

                const titleEl = this.appendElement.querySelector('.log-title');
                if (titleEl && data[config.titleKey]) {
                    titleEl.textContent = data[config.titleKey];
                }

                const summary = data[config.summaryKey];
                if (summary) {
                    renderSummary.call(this, config, summary);
                }

                const columns = data[config.columnsKey];
                if (columns && Array.isArray(columns)) {
                    renderTableHeader.call(this, config, columns);
                }

                const events = data[config.eventsKey];
                if (events && Array.isArray(events)) {
                    this._eventsData = events;
                    renderRows.call(this, config, events);
                }
            }

            function renderSummary(config, summary) {
                const container = this.appendElement.querySelector('.status-items');
                if (!container) return;
                container.innerHTML = '';

                fx.go(
                    config.summaryOrder,
                    fx.each(level => {
                        const count = summary[level] ?? 0;
                        const item = document.createElement('div');
                        item.className = `status-item ${level}`;
                        item.dataset.level = level;
                        item.innerHTML = `
                            <div class="status-dot ${level}"></div>
                            <span class="count">${count}</span>
                        `;
                        container.appendChild(item);
                    })
                );
            }

            function renderTableHeader(config, columns) {
                const headerEl = this.appendElement.querySelector('.table-header');
                if (!headerEl) return;
                headerEl.innerHTML = '';

                fx.go(
                    columns,
                    fx.each(col => {
                        const cell = document.createElement('div');
                        const cssClass = config.headerClasses[col.key] || '';
                        cell.className = `th-cell ${cssClass}`;
                        cell.textContent = col.label;
                        headerEl.appendChild(cell);
                    })
                );
            }

            function renderRows(config, events) {
                const bodyEl = this.appendElement.querySelector('.table-body');
                if (!bodyEl) return;
                bodyEl.innerHTML = '';

                fx.go(
                    events,
                    fx.each((event, index) => {
                        const row = createRow.call(this, config, event, index);
                        bodyEl.appendChild(row);
                    })
                );
            }

            function createRow(config, event, index) {
                const { eventFields, columnClasses, timeFields } = config;
                const level = event[eventFields.level] || 'normal';
                const isSelected = this._selectedRowIndex === index;

                const row = document.createElement('div');
                row.className = 'table-row';
                row.dataset.index = index;
                row._eventData = event;
                if (isSelected) row.classList.add('row-selected');
                if (event._acked) row.classList.add('row-acked');

                // 등급 (status dot)
                const gradeCell = document.createElement('div');
                gradeCell.className = `td-cell ${columnClasses.level}`;
                gradeCell.innerHTML = `<div class="row-dot ${level}"></div>`;
                row.appendChild(gradeCell);

                // 나머지 컬럼
                const fieldOrder = ['assetId', 'location', 'firstTime', 'lastTime', 'group', 'message'];
                fx.go(
                    fieldOrder,
                    fx.each(field => {
                        const cell = document.createElement('div');
                        cell.className = `td-cell ${columnClasses[field] || ''}`;
                        const value = event[eventFields[field]] || '-';
                        const isTime = timeFields.includes(field);
                        cell.innerHTML = `<span class="${isTime ? 'text-time' : 'text-default'}">${value}</span>`;
                        row.appendChild(cell);
                    })
                );

                // 선택된 행: 액션 버튼
                if (isSelected && event[eventFields.isNew]) {
                    const actions = document.createElement('div');
                    actions.className = 'row-actions';
                    actions.innerHTML = `
                        <button class="btn-new"><span>신규</span></button>
                        <button class="btn-row-action">
                            <div class="icon-cctv"><img src="./assets/icon-cctv.svg" alt=""></div>
                            <span>영상</span>
                        </button>
                        <button class="btn-row-action"><span>영상</span></button>
                    `;
                    row.appendChild(actions);
                }

                return row;
            }

            // INTERNAL HANDLERS

            function setupInternalHandlers() {
                const root = this.appendElement;

                this._internalHandlers.rowClick = (e) => {
                    const row = e.target.closest('.table-row');
                    if (row) {
                        const index = parseInt(row.dataset.index, 10);
                        this._selectedEvent = row._eventData || null;
                        this.selectRow(index);
                    }
                };

                this._internalHandlers.expandClick = (e) => {
                    const btn = e.target.closest('.btn-expand');
                    if (!btn) return;
                    const bottomLog = root.querySelector('.bottom-log');
                    if (!bottomLog) return;

                    this._collapsed = !this._collapsed;
                    root.style.overflow = this._collapsed ? 'hidden' : '';
                    bottomLog.style.transition = 'transform 0.3s ease';
                    bottomLog.style.transform = this._collapsed
                        ? 'translateY(calc(100% - 48px))'
                        : '';

                    const icon = btn.querySelector('.icon-expand');
                    if (icon) {
                        icon.style.transition = 'transform 0.3s ease';
                        icon.style.transform = this._collapsed ? 'rotate(180deg)' : '';
                    }
                };

                this._internalHandlers.toggleClick = (e) => {
                    const toggle = e.target.closest('.toggle-switch') || e.target.closest('.toggle-pill');
                    if (!toggle) return;

                    this._autoEnabled = !this._autoEnabled;
                    const knob = root.querySelector('.toggle-knob');
                    const bg = root.querySelector('.toggle-switch-bg');
                    const label = root.querySelector('.auto-label');

                    if (root.querySelector('.toggle-switch')) {
                        root.querySelector('.toggle-switch').style.justifyContent =
                            this._autoEnabled ? 'flex-end' : 'flex-start';
                    }
                    if (bg) {
                        bg.style.opacity = this._autoEnabled ? '' : '0.3';
                    }
                    if (label) {
                        label.style.color = this._autoEnabled ? '#94a3b8' : '#4a5568';
                    }
                };

                this._internalHandlers.ackClick = (e) => {
                    const btn = e.target.closest('.btn-ack');
                    if (!btn || !this._selectedEvent) return;
                    this._selectedEvent._acked = true;
                    this._selectedEvent[config.eventFields.isNew] = false;
                    applyFilter.call(this, config);
                };

                this._internalHandlers.allClick = (e) => {
                    const btn = e.target.closest('.btn-all');
                    if (!btn || !this._eventsData) return;
                    this._eventsData.forEach(event => {
                        event._acked = true;
                        event[config.eventFields.isNew] = false;
                    });
                    applyFilter.call(this, config);
                };

                this._internalHandlers.filterClick = (e) => {
                    const item = e.target.closest('.status-item[data-level]');
                    if (!item) return;
                    const level = item.dataset.level;
                    if (this._activeFilters.has(level)) {
                        this._activeFilters.delete(level);
                    } else {
                        this._activeFilters.add(level);
                    }
                    this._selectedRowIndex = null;
                    updateFilterUI.call(this);
                    applyFilter.call(this, config);
                };

                root.addEventListener('click', this._internalHandlers.rowClick);
                root.addEventListener('click', this._internalHandlers.expandClick);
                root.addEventListener('click', this._internalHandlers.toggleClick);
                root.addEventListener('click', this._internalHandlers.ackClick);
                root.addEventListener('click', this._internalHandlers.allClick);
                root.addEventListener('click', this._internalHandlers.filterClick);
            }

            function updateFilterUI() {
                const items = this.appendElement.querySelectorAll('.status-item[data-level]');
                const hasFilter = this._activeFilters.size > 0;
                items.forEach(item => {
                    const level = item.dataset.level;
                    item.classList.toggle('filter-active', this._activeFilters.has(level));
                    item.classList.toggle('filter-inactive', hasFilter && !this._activeFilters.has(level));
                });
            }

            function applyFilter(config) {
                if (!this._eventsData) return;
                const events = this._activeFilters.size === 0
                    ? this._eventsData
                    : this._eventsData.filter(e => this._activeFilters.has(e[config.eventFields.level]));
                renderRows.call(this, config, events);
            }

            function selectRow(config, index) {
                const prevRow = this.appendElement.querySelector('.table-row.row-selected');
                if (prevRow) prevRow.classList.remove('row-selected');

                this._selectedRowIndex = index;

                if (this._eventsData) {
                    applyFilter.call(this, config);
                }
            }

        }).call(mockThis);

        // ======================
        // BEFORE DESTROY
        // ======================

        function destroy() {
            (function beforeDestroy() {
                const { unsubscribe } = GlobalDataPublisher;
                const { removeCustomEvents } = Wkit;
                const { each } = fx;

                fx.go(
                    Object.entries(this.subscriptions),
                    each(([topic, _]) => unsubscribe(topic, this))
                );
                this.subscriptions = null;

                removeCustomEvents(this, this.customEvents);
                this.customEvents = null;

                if (this._internalHandlers) {
                    const root = this.appendElement;
                    root.removeEventListener('click', this._internalHandlers.rowClick);
                }
                this._internalHandlers = null;

                this._selectedRowIndex = null;
                this._eventsData = null;

                this.renderData = null;
                this.selectRow = null;

                console.log('[EventLog] Destroyed');
            }).call(mockThis);
        }
