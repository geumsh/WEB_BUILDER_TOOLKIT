<div class="bottom-log">
  <!-- Header -->
  <div class="log-header">
    <div class="header-left">
      <span class="log-title">-</span>
      <div class="header-divider"></div>
      <div class="sound-group">
        <button class="sound-btn">
          <img src="./assets/icon-volume.svg" class="icon-volume" alt="" />
          <span>소리 알림</span>
        </button>
        <div class="toggle-pill">
          <span class="auto-label">AUTO</span>
          <div class="toggle-switch">
            <div class="toggle-switch-bg"></div>
            <div class="toggle-switch-overlay"></div>
            <div class="toggle-knob"></div>
            <div class="toggle-switch-inset"></div>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-expand">
      <img src="./assets/icon-expand.svg" class="icon-expand" alt="" />
    </button>
    <div class="header-right">
      <div class="action-buttons">
        <button class="btn-action btn-ack"><span>Ack</span></button>
        <button class="btn-action btn-all"><span>All</span></button>
      </div>
      <div class="right-divider"></div>
      <div class="status-items"></div>
    </div>
  </div>
  <!-- Table Header -->
  <div class="table-header"></div>
  <!-- Table Body -->
  <div class="table-body"></div>
</div>
