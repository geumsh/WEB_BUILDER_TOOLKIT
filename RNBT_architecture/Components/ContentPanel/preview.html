<body>
    <h1>ContentPanel + Contents Components (Integrated)</h1>
    <p class="subtitle">ContentPanel shell + 3개 컨텐츠 컴포넌트 (renderData 기반)</p>
    <div id="content-panel-container"></div>
    <div class="controls">
        <div class="controls-group">
            <span class="controls-label">Data</span>
            <button class="slot-btn" onclick="sendAllData()">Load All Data</button>
            <button class="slot-btn" onclick="updateChartData()">Update Chart</button>
            <button class="slot-btn" onclick="updateSystemData()">Update System</button>
            <button class="slot-btn" onclick="updateBatteryData()">Update Battery</button>
        </div>
        <div class="divider"></div>
        <div class="controls-group">
            <span class="controls-label">Slot API</span>
            <button onclick="removeSystemSlot()">Remove 'system' Slot</button>
            <button onclick="clearAllSlots()">Clear All</button>
            <button onclick="resetAll()">Reset</button>
        </div>
        <div class="divider"></div>
        <div class="controls-group">
            <span class="controls-label">Common</span>
            <button onclick="destroy()" class="destroy">Destroy</button>
        </div>
    </div>

    <script>
        // ======================
        // MOCK DEPENDENCIES
        // ======================

        const GlobalDataPublisher = {
            subscribe: (topic, context, fn) => console.log(`[Mock] subscribe: ${topic}`),
            unsubscribe: (topic, context) => console.log(`[Mock] unsubscribe: ${topic}`)
        };

        const Wkit = {
            bindEvents: (context, events) => console.log('[Mock] bindEvents:', events),
            removeCustomEvents: (context, events) => console.log('[Mock] removeCustomEvents:', events)
        };

        const fx = {
            go: (arr, ...fns) => fns.reduce((acc, fn) => fn(acc), arr),
            each: fn => arr => { arr.forEach(fn); return arr; }
        };

        // ======================
        // COMPONENT HTML TEMPLATES
        // ======================

        const chartHtml = `
            <div class="contents-power-chart">
                <div class="contents-title">
                    <div class="contents-title-txt">
                        <span class="dot-indicator"></span>
                        <span class="contents-title-text">-</span>
                    </div>
                    <div class="union-dots"></div>
                </div>
                <div class="section section--chart">
                    <div class="chart-block">
                        <div class="chart-header">
                            <span class="chart-label">-</span>
                            <div class="chart-value">
                                <span class="value-number">-</span>
                                <span class="value-unit">-</span>
                            </div>
                        </div>
                        <div class="chart-body">
                            <div class="chart-legend"></div>
                            <div class="chart-area">
                                <div class="chart-y-axis"></div>
                                <div class="chart-grid-area">
                                    <div class="chart-grid"></div>
                                    <div class="chart-bars"></div>
                                </div>
                                <div class="chart-x-axis"></div>
                            </div>
                        </div>
                    </div>
                    <div class="section-inset-shadow"></div>
                </div>
            </div>
        `;

        const systemHtml = `
            <div class="contents-system-status">
                <div class="contents-title">
                    <div class="contents-title-txt">
                        <span class="dot-indicator"></span>
                        <span class="contents-title-text">-</span>
                    </div>
                    <div class="union-dots"></div>
                </div>
                <div class="section-row">
                    <div class="section section--gauge-box">
                        <span class="gauge-label">-</span>
                        <div class="gauge-chart">
                            <div class="gauge-image"></div>
                            <div class="gauge-value">
                                <span class="gauge-number">-</span>
                                <span class="gauge-unit">-</span>
                            </div>
                        </div>
                        <div class="section-inset-shadow"></div>
                    </div>
                    <div class="section section--list-box">
                        <div class="system-list"></div>
                        <div class="section-inset-shadow"></div>
                    </div>
                </div>
            </div>
        `;

        const batteryHtml = `
            <div class="contents-battery-group">
                <div class="contents-title">
                    <div class="contents-title-txt">
                        <span class="dot-indicator"></span>
                        <span class="contents-title-text">-</span>
                    </div>
                    <div class="union-dots"></div>
                </div>
                <div class="section section--battery">
                    <div class="battery-block">
                        <div class="battery-header">
                            <div class="battery-header-item">
                                <span class="battery-dot"></span>
                                <span class="battery-group-name">-</span>
                            </div>
                            <div class="battery-header-item">
                                <span class="battery-datetime">-</span>
                            </div>
                        </div>
                        <div class="battery-body">
                            <div class="donut-chart">
                                <div class="donut-image"></div>
                                <div class="donut-value">
                                    <span class="donut-number">-</span>
                                    <span class="donut-unit">-</span>
                                </div>
                            </div>
                            <div class="battery-legend"></div>
                        </div>
                    </div>
                    <div class="section-inset-shadow"></div>
                </div>
            </div>
        `;

        // ======================
        // CONTENT PANEL (Shell)
        // ======================

        const panelThis = {
            appendElement: document.getElementById('content-panel-container')
        };

        panelThis.appendElement.innerHTML = `<div class="content-panel"></div>`;

        // Register ContentPanel shell
        (function registerPanel() {
            this.updateSlot = function(slotId, html) {
                const panel = this.appendElement.querySelector('.content-panel');
                if (!panel) return;
                let slot = panel.querySelector('.contents[data-slot-id="' + slotId + '"]');
                if (!slot) {
                    slot = document.createElement('div');
                    slot.className = 'contents';
                    slot.setAttribute('data-slot-id', slotId);
                    panel.appendChild(slot);
                }
                slot.innerHTML = html;
            }.bind(this);

            this.getSlot = function(slotId) {
                const panel = this.appendElement.querySelector('.content-panel');
                if (!panel) return null;
                return panel.querySelector('.contents[data-slot-id="' + slotId + '"]');
            }.bind(this);

            this.removeSlot = function(slotId) {
                const panel = this.appendElement.querySelector('.content-panel');
                if (!panel) return;
                const slot = panel.querySelector('.contents[data-slot-id="' + slotId + '"]');
                if (slot) panel.removeChild(slot);
            }.bind(this);

            this.clearContents = function() {
                const panel = this.appendElement.querySelector('.content-panel');
                if (panel) panel.innerHTML = '';
            }.bind(this);
        }).call(panelThis);

        // Initialize slots with component HTML
        panelThis.updateSlot('chart', chartHtml);
        panelThis.updateSlot('system', systemHtml);
        panelThis.updateSlot('battery', batteryHtml);

        // ======================
        // CONTENT COMPONENTS (mock contexts targeting slots)
        // ======================

        // Each component targets its slot element as appendElement
        const chartThis = { appendElement: panelThis.getSlot('chart') };
        const systemThis = { appendElement: panelThis.getSlot('system') };
        const batteryThis = { appendElement: panelThis.getSlot('battery') };

        // --- ContentsPowerChart register ---
        (function registerChart() {
            const config = {
                titleKey: 'title', chartLabelKey: 'chartLabel', valueKey: 'value',
                unitKey: 'unit', legendItemsKey: 'legendItems', seriesKey: 'series',
                xLabelsKey: 'xLabels', yAxisMax: 800, yAxisStep: 200,
                barMaxHeight: 100, barColors: ['blue', 'green']
            };
            this.renderData = renderData.bind(this, config);
            this.subscriptions = { powerChartData: ['renderData'] };

            function renderData(config, { response }) {
                const { data } = response;
                if (!data) return;
                const titleEl = this.appendElement.querySelector('.contents-title-text');
                if (titleEl && data[config.titleKey]) titleEl.textContent = data[config.titleKey];
                const labelEl = this.appendElement.querySelector('.chart-label');
                if (labelEl && data[config.chartLabelKey]) labelEl.textContent = data[config.chartLabelKey];
                const numberEl = this.appendElement.querySelector('.value-number');
                if (numberEl && data[config.valueKey] !== undefined) numberEl.textContent = data[config.valueKey];
                const unitEl = this.appendElement.querySelector('.value-unit');
                if (unitEl && data[config.unitKey]) unitEl.textContent = data[config.unitKey];
                const legendItems = data[config.legendItemsKey];
                if (legendItems && Array.isArray(legendItems)) {
                    const legendEl = this.appendElement.querySelector('.chart-legend');
                    legendEl.innerHTML = '';
                    legendItems.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'legend-item';
                        div.innerHTML = `<div class="legend-color legend-color--${item.color}"></div><span class="legend-text">${item.text}</span>`;
                        legendEl.appendChild(div);
                    });
                }
                const yMax = data.yAxisMax || config.yAxisMax;
                const yStep = data.yAxisStep || config.yAxisStep;
                const yAxisEl = this.appendElement.querySelector('.chart-y-axis');
                if (yAxisEl) {
                    yAxisEl.innerHTML = '';
                    for (let v = yMax; v > 0; v -= yStep) {
                        const span = document.createElement('span');
                        span.className = 'axis-label';
                        span.textContent = v;
                        yAxisEl.appendChild(span);
                    }
                    const zeroSpan = document.createElement('span');
                    zeroSpan.className = 'axis-label axis-label--zero';
                    zeroSpan.textContent = '0';
                    yAxisEl.appendChild(zeroSpan);
                }
                const gridEl = this.appendElement.querySelector('.chart-grid');
                if (gridEl) {
                    const lineCount = yMax / yStep;
                    gridEl.innerHTML = '';
                    for (let i = 0; i <= lineCount; i++) {
                        const line = document.createElement('div');
                        line.className = i === 0 ? 'grid-line grid-line--solid' : 'grid-line grid-line--dashed';
                        gridEl.appendChild(line);
                    }
                }
                const series = data[config.seriesKey];
                if (series && Array.isArray(series)) {
                    const barsEl = this.appendElement.querySelector('.chart-bars');
                    barsEl.innerHTML = '';
                    series.forEach(group => {
                        const groupDiv = document.createElement('div');
                        groupDiv.className = 'bar-group';
                        (group.values || []).forEach((val, i) => {
                            const bar = document.createElement('div');
                            bar.className = `bar bar--${config.barColors[i] || 'blue'}`;
                            bar.style.height = Math.min(Math.round((val / yMax) * config.barMaxHeight), config.barMaxHeight) + 'px';
                            groupDiv.appendChild(bar);
                        });
                        barsEl.appendChild(groupDiv);
                    });
                }
                const xLabels = data[config.xLabelsKey];
                if (xLabels && Array.isArray(xLabels)) {
                    const xAxisEl = this.appendElement.querySelector('.chart-x-axis');
                    xAxisEl.innerHTML = '';
                    xLabels.forEach(label => {
                        const span = document.createElement('span');
                        span.className = 'axis-label-x';
                        span.textContent = label;
                        xAxisEl.appendChild(span);
                    });
                }
            }
        }).call(chartThis);

        // --- ContentsSystemStatus register ---
        (function registerSystem() {
            const config = {
                titleKey: 'title', gaugeLabelKey: 'gaugeLabel', gaugeValueKey: 'gaugeValue',
                gaugeUnitKey: 'gaugeUnit', systemListKey: 'systemList',
                systemFields: { name: 'name', value: 'value', unit: 'unit', status: 'status' },
                statusMap: { normal: { text: '정상', class: 'normal' }, warning: { text: '비정상', class: 'warning' } }
            };
            this.renderData = renderData.bind(this, config);
            this.subscriptions = { systemStatusData: ['renderData'] };

            function renderData(config, { response }) {
                const { data } = response;
                if (!data) return;
                const titleEl = this.appendElement.querySelector('.contents-title-text');
                if (titleEl && data[config.titleKey]) titleEl.textContent = data[config.titleKey];
                const gaugeLabelEl = this.appendElement.querySelector('.gauge-label');
                if (gaugeLabelEl && data[config.gaugeLabelKey]) gaugeLabelEl.textContent = data[config.gaugeLabelKey];
                const gaugeNumberEl = this.appendElement.querySelector('.gauge-number');
                if (gaugeNumberEl && data[config.gaugeValueKey] !== undefined) gaugeNumberEl.textContent = data[config.gaugeValueKey];
                const gaugeUnitEl = this.appendElement.querySelector('.gauge-unit');
                if (gaugeUnitEl && data[config.gaugeUnitKey]) gaugeUnitEl.textContent = data[config.gaugeUnitKey];
                const systemList = data[config.systemListKey];
                if (systemList && Array.isArray(systemList)) {
                    const listEl = this.appendElement.querySelector('.system-list');
                    listEl.innerHTML = '';
                    systemList.forEach(item => {
                        const { systemFields, statusMap } = config;
                        const row = document.createElement('div');
                        row.className = 'system-list-row';
                        const name = item[systemFields.name] || '-';
                        const status = item[systemFields.status] || 'normal';
                        let leftHtml = `<div class="system-group"><div class="system-icon-wrap"></div><span class="system-name">${name}</span></div>`;
                        let rightHtml = '';
                        if (status === 'value') {
                            rightHtml = `<div class="system-value"><span class="system-number">${item[systemFields.value] || '-'}</span><span class="system-percent">${item[systemFields.unit] || ''}</span></div>`;
                        } else if (status === 'warning') {
                            const si = statusMap[status];
                            rightHtml = `<div class="system-status-warn"><div class="warn-icon"></div><span class="system-status system-status--${si.class}">${si.text}</span></div>`;
                        } else {
                            const si = statusMap[status] || statusMap.normal;
                            rightHtml = `<span class="system-status system-status--${si.class}">${si.text}</span>`;
                        }
                        row.innerHTML = leftHtml + rightHtml;
                        listEl.appendChild(row);
                    });
                }
            }
        }).call(systemThis);

        // --- ContentsBatteryGroup register ---
        (function registerBattery() {
            const config = {
                titleKey: 'title', groupNameKey: 'groupName', datetimeKey: 'datetime',
                totalValueKey: 'totalValue', totalUnitKey: 'totalUnit', itemsKey: 'items',
                itemFields: { color: 'color', name: 'name', percentage: 'percentage' }
            };
            this.renderData = renderData.bind(this, config);
            this.subscriptions = { batteryGroupData: ['renderData'] };

            function renderData(config, { response }) {
                const { data } = response;
                if (!data) return;
                const titleEl = this.appendElement.querySelector('.contents-title-text');
                if (titleEl && data[config.titleKey]) titleEl.textContent = data[config.titleKey];
                const groupNameEl = this.appendElement.querySelector('.battery-group-name');
                if (groupNameEl && data[config.groupNameKey]) groupNameEl.textContent = data[config.groupNameKey];
                const datetimeEl = this.appendElement.querySelector('.battery-datetime');
                if (datetimeEl && data[config.datetimeKey]) datetimeEl.textContent = data[config.datetimeKey];
                const totalNumberEl = this.appendElement.querySelector('.donut-number');
                if (totalNumberEl && data[config.totalValueKey] !== undefined) totalNumberEl.textContent = data[config.totalValueKey];
                const totalUnitEl = this.appendElement.querySelector('.donut-unit');
                if (totalUnitEl && data[config.totalUnitKey]) totalUnitEl.textContent = data[config.totalUnitKey];
                const items = data[config.itemsKey];
                if (items && Array.isArray(items)) {
                    const legendEl = this.appendElement.querySelector('.battery-legend');
                    legendEl.innerHTML = '';
                    items.forEach(item => {
                        const { itemFields } = config;
                        const row = document.createElement('div');
                        row.className = 'battery-legend-row';
                        row.innerHTML = `<div class="battery-legend-item"><div class="battery-legend-color" style="background:${item[itemFields.color] || '#445ed9'};"></div><span class="battery-legend-text">${item[itemFields.name] || '-'}</span></div><span class="battery-legend-value">${item[itemFields.percentage] || '-'}</span>`;
                        legendEl.appendChild(row);
                    });
                }
            }
        }).call(batteryThis);

        // ======================
        // TEST DATA
        // ======================

        const chartData = {

            legendItems: [{ color: 'blue', text: '금일' }, { color: 'green', text: '금주' }],
            series: [
                { values: [560, 120] }, { values: [664, 560] }, { values: [656, 560] },

            ],
            xLabels: ['01', '02', '03', '04', '05', '06', '07']
        };

        const chartDataUpdated = {
            title: '실제 전력 현황', chartLabel: '실제 전력 평균', value: '945.1200', unit: 'KW',
            legendItems: [{ color: 'blue', text: '금일' }, { color: 'green', text: '금주' }],
            series: [
                { values: [720, 360] }, { values: [760, 640] }, { values: [704, 600] },
                { values: [624, 480] }, { values: [576, 440] }, { values: [520, 384] }, { values: [400, 336] }
            ],

        const systemData = {

            systemList: [
                { name: '시스템 #01', value: 76, unit: '%', status: 'value' },
                { name: '시스템 #02', status: 'normal' },
                { name: '시스템 #03', status: 'warning' }

        };

        const systemDataUpdated = {

            systemList: [
                { name: '시스템 #01', value: 65, unit: '%', status: 'value' },
                { name: '시스템 #02', status: 'warning' },

        const batteryData = {

            totalValue: '1,110', totalUnit: 'KW',

            totalValue: '2,350', totalUnit: 'KW',

                { color: '#81e1c5', name: '점검', percentage: '5%' }
            ]
        };

        // ======================
        // TEST ACTIONS
        // ======================

        function sendAllData() {
            chartThis.renderData({ response: { data: chartData } });
            systemThis.renderData({ response: { data: systemData } });
            batteryThis.renderData({ response: { data: batteryData } });
            console.log('[Test] All data loaded');
        }

        function updateChartData() {
            chartThis.renderData({ response: { data: chartDataUpdated } });
            console.log('[Test] Chart data updated');
        }

        function updateSystemData() {
            systemThis.renderData({ response: { data: systemDataUpdated } });
            console.log('[Test] System data updated');
        }

        function updateBatteryData() {
            batteryThis.renderData({ response: { data: batteryDataUpdated } });
            console.log('[Test] Battery data updated');
        }

        function removeSystemSlot() {
            panelThis.removeSlot('system');
            console.log('[Test] Removed system slot');
        }

        function clearAllSlots() {
            panelThis.clearContents();
            console.log('[Test] Cleared all slots');
        }

        function resetAll() {
            panelThis.appendElement.innerHTML = '<div class="content-panel"></div>';
            panelThis.updateSlot('chart', chartHtml);
            panelThis.updateSlot('system', systemHtml);
            panelThis.updateSlot('battery', batteryHtml);
            chartThis.appendElement = panelThis.getSlot('chart');
            systemThis.appendElement = panelThis.getSlot('system');
            batteryThis.appendElement = panelThis.getSlot('battery');
            sendAllData();
            console.log('[Test] Reset all');
        }

        function destroy() {
            chartThis.renderData = null;
            systemThis.renderData = null;
            batteryThis.renderData = null;
            panelThis.updateSlot = null;
            panelThis.getSlot = null;
            panelThis.removeSlot = null;
            panelThis.clearContents = null;
            console.log('[ContentPanel + Contents] destroyed');
        }

        // 초기 렌더링
        sendAllData();
    </script>
