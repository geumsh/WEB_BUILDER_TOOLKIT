<div class="event-log">
  <!-- Header -->
  <div class="header-wrapper">
    <div class="header-content">
      <div class="header-container">
        <!-- Left: Title + Divider + Search -->
        <div class="header-left">
          <div class="header-item">
            <div class="header-icon">
              <img src="./assets/icon-event.svg" alt="">
            </div>
            <p class="header-title">-</p>
          </div>
          <div class="header-divider"></div>
          <div class="search-box">
            <div class="search-icon">
              <img src="./assets/icon-search.svg" alt="">
            </div>
            <input type="text" class="search-input" placeholder="Search logs...">
          </div>
        </div>
        <!-- Right: Filter Tabs + Toggle -->
        <div class="header-right-group">
          <div class="filter-tabs"></div>
          <button class="toggle-btn">
            <svg class="toggle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- Cards -->
  <div class="cards-container">
    <div class="cards-content"></div>
  </div>
</div>
