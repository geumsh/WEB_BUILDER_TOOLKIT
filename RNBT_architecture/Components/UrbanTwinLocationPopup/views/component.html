<div class="popup">
  <!-- Title Bar -->
  <div class="popup-title-bar">
    <p class="popup-title">-</p>
    <button class="btn-close">
      <img src="./assets/btn-close.svg" alt="Close" />
    </button>
  </div>

  <!-- Content -->
  <div class="popup-content">
    <!-- Left: Image -->
    <div class="image-container">
      <img class="popup-image" src="" alt="" />
      <div class="image-badge">
        <span class="badge-text">-</span>
      </div>
    </div>

    <!-- Right: Info + Settings + Button -->
    <div class="right-container">
      <!-- 상세정보 -->
      <div class="info-card">
        <p class="card-title">상세정보</p>
        <div class="info-row">
          <span class="info-label">위치:</span>
          <span class="info-value" data-field="location">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">규격:</span>
          <span class="info-value" data-field="size">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">운영시간:</span>
          <span class="info-value" data-field="schedule">-</span>
        </div>
      </div>

      <!-- 환경설정 -->
      <div class="settings-card">
        <p class="card-title">환경설정</p>
        <div class="info-row">
          <span class="info-label">시간대:</span>
          <img class="toggle-icon" src="./assets/toggle.svg" alt="" />
        </div>
        <div class="info-row">
          <span class="info-label">시점:</span>
          <span class="info-value" data-field="viewpoint">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">프리셋:</span>
          <span class="info-value" data-field="preset">-</span>
        </div>
      </div>

      <!-- 체험하기 버튼 -->
      <button class="btn-experience">체험하기</button>
    </div>
  </div>
</div>
