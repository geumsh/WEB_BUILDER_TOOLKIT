<div class="block">
    <div class="group">
        <!-- Header -->
        <div class="header">
            <div class="title">
                <div class="title-icon">
                    <img src="./assets/a3c2ab6590a36270718937ec11e700f8f2584c7e.svg" alt="icon">
                </div>
                <span class="title-text">시간대별 거래추이</span>
            </div>
            <div class="action">
                <div class="btn active" data-tab="all">
                    <span class="btn-text">전체</span>
                </div>
                <div class="btn" data-tab="product">
                    <span class="btn-text">상품</span>
                </div>
                <div class="btn" data-tab="1q">
                    <span class="btn-text">1Q</span>
                </div>
            </div>
        </div>
        <!-- Container -->
        <div class="container">
            <!-- Date + Chart -->
            <div class="contents">
                <div class="date-row">
                    <div class="date-box">
                        <span class="date-label">PEAK일</span>
                        <span class="date-value"></span>
                    </div>
                </div>
                <div class="chart-container"></div>
            </div>
            <!-- Legend -->
            <div class="legend">
                <div class="legend-item"><span class="legend-dot" style="background:#f43031;"></span><span class="legend-text">역대픽</span></div>
                <div class="legend-item"><span class="legend-dot" style="background:#5bdcc6;"></span><span class="legend-text">연중최고픽</span></div>
                <div class="legend-item"><span class="legend-dot" style="background:#00cded;"></span><span class="legend-text">월픽</span></div>
                <div class="legend-item"><span class="legend-dot" style="background:#8b7cf6;"></span><span class="legend-text">전일</span></div>
                <div class="legend-item"><span class="legend-dot" style="background:#ffaa00;"></span><span class="legend-text">금일</span></div>
                <div class="legend-inner-shadow"></div>
            </div>
        </div>
    </div>
    <div class="block-inner-shadow"></div>
</div>
