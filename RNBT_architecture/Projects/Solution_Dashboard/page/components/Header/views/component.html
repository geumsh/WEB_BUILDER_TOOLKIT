<div class="header">
    <!-- Logo -->
    <div class="logo-area">
        <div class="logo">
            <div class="logo-symbol">
                <span class="logo-symbol-text"></span>
            </div>
            <span class="logo-text"></span>
        </div>
    </div>

    <!-- GNB -->
    <div class="gnb">
        <div class="gnb-inner">
            <!-- JS가 nav 항목 렌더 -->
        </div>
        <div class="gnb-shadow"></div>
    </div>

    <!-- Info -->
    <div class="info">
        <div class="info-container">
            <!-- Toggle -->
            <div class="toggle">
                <!-- JS가 토글 버튼 렌더 -->
            </div>

            <!-- Btn Items -->
            <div class="btn-items">
                <!-- JS가 원형 버튼 렌더 -->
            </div>

            <!-- Divider -->
            <div class="divider-wrap">
                <div class="divider"></div>
            </div>

            <!-- DateTime -->
            <div class="datetime">
                <span class="datetime-time"></span>
                <span class="datetime-date"></span>
            </div>
        </div>
    </div>
</div>
