<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* ===== Component CSS (from styles/component.css) ===== */
        #header-container {
            width: 1920px;
            height: 60px;
            overflow: auto;
            font-family: 'Pretendard', sans-serif;

            & .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                height: 100%;
                padding: 10px 20px;
                box-sizing: border-box;
                background: rgba(0, 0, 0, 0.6);
            }

            & .logo-area {
                height: 32px;
                width: 442px;
                display: flex;
                align-items: center;
            }

            & .logo {
                display: flex;
                align-items: center;
                gap: 7px;
                height: 28px;
            }

            & .logo-symbol {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 8.75px;
                box-shadow: 0px 0px 13.125px 0px rgba(29, 78, 216, 0.5);
                background-image:
                    linear-gradient(-23.6756deg, rgba(96, 235, 255, 0) 9.7594%, rgb(96, 255, 234) 93.845%),
                    linear-gradient(-34.8245deg, rgba(112, 132, 245, 0) 15.237%, rgb(129, 225, 197) 112.01%),
                    linear-gradient(90deg, rgb(175, 238, 247) 0%, rgb(175, 238, 247) 100%);
            }

            & .logo-symbol-text {
                font-family: 'Roboto Mono', monospace;
                font-weight: 700;
                font-size: 18px;
                text-align: center;
                color: #f8fafc;
                line-height: normal;
            }

            & .logo-text {
                font-family: 'Roboto Mono', monospace;
                font-weight: 700;
                font-size: 22px;
                color: #f8fafc;
                line-height: normal;
            }

            & .gnb {
                height: 40px;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(50px);
                background-image:
                    linear-gradient(90deg, rgba(144, 161, 185, 0.1) 0%, rgba(144, 161, 185, 0.1) 100%),
                    linear-gradient(90deg, rgba(3, 51, 72, 0.4) 0%, rgba(3, 51, 72, 0.4) 100%);
                position: relative;
                flex-shrink: 0;
            }

            & .gnb-inner {
                display: flex;
                align-items: center;
                gap: 40px;
                height: 100%;
                padding: 1px 41px;
                overflow: clip;
                border-radius: inherit;
                box-sizing: border-box;
            }

            & .gnb-shadow {
                position: absolute;
                inset: 0;
                border-radius: inherit;
                pointer-events: none;
                box-shadow:
                    inset 0px -4px 14px 0px rgba(17, 17, 17, 0.25),
                    inset 0px 4px 4px 0px rgba(96, 235, 255, 0.25);
            }

            & .gnb-link {
                height: 38px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
            }

            & .gnb-link--active {
                width: 66px;
                position: relative;
            }

            & .gnb-link-text {
                font-family: 'Pretendard', sans-serif;
                font-weight: 500;
                font-size: 17px;
                color: #e4ebf6;
                text-align: center;
                line-height: normal;
                white-space: nowrap;
            }

            & .gnb-link-text--active {
                font-weight: 600;
                background-image:
                    linear-gradient(0deg, rgba(129, 225, 197, 0) 12.5%, rgb(129, 225, 197) 137.5%),
                    linear-gradient(90deg, rgb(175, 238, 247) 0%, rgb(175, 238, 247) 100%);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                color: transparent;
                flex: 1 0 0;
                min-height: 1px;
                min-width: 1px;
                white-space: pre-wrap;
            }

            & .gnb-link-frame {
                position: absolute;
                top: 0;
                left: 0;
                width: 66px;
                height: 39px;
            }

            & .gnb-link-frame img {
                display: block;
                width: 100%;
                height: 100%;
            }

            & .info {
                display: flex;
                align-items: center;
                flex-shrink: 0;
            }

            & .info-container {
                display: flex;
                align-items: center;
                gap: 19.743px;
            }

            & .toggle {
                display: flex;
                gap: 9px;
                align-items: center;
                padding: 4px;
                border-radius: 100px;
                flex-shrink: 0;
            }

            & .btn-type-a {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 5px 20px;
                border-radius: 6px;
                box-shadow: 0px 4px 4px 0px rgba(44, 44, 44, 0.15);
                flex-shrink: 0;
                cursor: pointer;
                box-sizing: border-box;
            }

            & .btn-type-a--active {
                backdrop-filter: blur(2px);
                border: 1px solid white;
                background-image:
                    linear-gradient(-9.73556deg, rgba(96, 235, 255, 0) 9.7594%, rgb(96, 255, 234) 93.845%),
                    linear-gradient(-15.2276deg, rgba(112, 132, 245, 0) 15.237%, rgb(129, 225, 197) 112.01%),
                    linear-gradient(90deg, rgb(175, 238, 247) 0%, rgb(175, 238, 247) 100%);
            }

            & .btn-type-a--active .btn-type-a-text {
                font-weight: 600;
                color: #1e202c;
            }

            & .btn-type-a--idle {
                backdrop-filter: blur(7px);
                border: 1px solid #90a1b9;
                background-image:
                    linear-gradient(90deg, rgba(144, 161, 185, 0.1) 0%, rgba(144, 161, 185, 0.1) 100%),
                    linear-gradient(90deg, rgba(33, 38, 50, 0.7) 0%, rgba(33, 38, 50, 0.7) 100%);
            }

            & .btn-type-a--idle .btn-type-a-text {
                font-weight: 500;
                color: #94a3b8;
            }

            & .btn-type-a-text {
                font-family: 'Pretendard', sans-serif;
                font-size: 14px;
                text-align: center;
                line-height: normal;
                flex-shrink: 0;
            }

            & .btn-items {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            & .btn-type-b {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 30px;
                height: 30px;
                border-radius: 78.947px;
                border: 1px solid #90a1b9;
                overflow: clip;
                padding: 1px;
                flex-shrink: 0;
                box-sizing: border-box;
                cursor: pointer;
            }

            & .btn-type-b--active {
                background-image:
                    linear-gradient(90deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.1) 100%),
                    linear-gradient(90deg, rgba(144, 161, 185, 0.2) 0%, rgba(144, 161, 185, 0.2) 100%),
                    linear-gradient(90deg, rgba(33, 38, 50, 0.7) 0%, rgba(33, 38, 50, 0.7) 100%);
            }

            & .btn-type-b--idle {
                background-image:
                    linear-gradient(90deg, rgba(144, 161, 185, 0.1) 0%, rgba(144, 161, 185, 0.1) 100%),
                    linear-gradient(90deg, rgba(33, 38, 50, 0.7) 0%, rgba(33, 38, 50, 0.7) 100%);
            }

            & .btn-icon {
                position: relative;
                width: 16.364px;
                height: 16.364px;
                flex-shrink: 0;
            }

            & .btn-icon-inner {
                position: absolute;
                width: 13.72px;
                height: 13px;
                top: 50%;
                left: 50%;
                transform: translate(calc(-50% + 0.18px), calc(-50% - 0.18px));
            }

            & .btn-icon-inner img {
                display: block;
                width: 100%;
                height: 100%;
            }

            & .divider-wrap {
                display: flex;
                align-items: center;
                align-self: stretch;
            }

            & .divider {
                width: 1.234px;
                height: 100%;
                background: rgba(255, 255, 255, 0.2);
                flex-shrink: 0;
            }

            & .datetime {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                justify-content: center;
                gap: 1px;
                height: 38px;
                flex-shrink: 0;
            }

            & .datetime-time {
                font-family: 'Roboto Mono', 'Noto Sans KR', sans-serif;
                font-weight: 500;
                font-size: 15px;
                color: #f8fafc;
                line-height: normal;
                flex-shrink: 0;
            }

            & .datetime-date {
                font-family: 'Roboto Mono', monospace;
                font-weight: 500;
                font-size: 14px;
                color: #94a3b8;
                text-align: right;
                line-height: normal;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body>
    <div id="header-container" style="width: 1920px; height: 60px;">
        <div class="header">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo">
                    <div class="logo-symbol">
                        <span class="logo-symbol-text"></span>
                    </div>
                    <span class="logo-text"></span>
                </div>
            </div>

            <!-- GNB -->
            <div class="gnb">
                <div class="gnb-inner"></div>
                <div class="gnb-shadow"></div>
            </div>

            <!-- Info -->
            <div class="info">
                <div class="info-container">
                    <div class="toggle"></div>
                    <div class="btn-items"></div>
                    <div class="divider-wrap">
                        <div class="divider"></div>
                    </div>
                    <div class="datetime">
                        <span class="datetime-time"></span>
                        <span class="datetime-date"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Mock Config ──
        var config = {
            logo: { symbolText: 'E', logoText: 'eCOBIT' },
            navItems: [
                { label: '상면관리', active: true },
                { label: '설비현황' },
                { label: '대응절차' },
                { label: '모의훈련' },
                { label: '이력관리' },
            ],
            toggleItems: [
                { label: '대시보드', active: true },
                { label: '리포트' },
            ],
            circleButtons: [
                { id: 'settings', active: true },
                { id: 'user', active: false },
                { id: 'logout', active: false },
            ],
            datetime: { visible: true },
        };

        var root = document.getElementById('header-container');

        // ── Render Logo ──
        function renderLogo() {
            root.querySelector('.logo-symbol-text').textContent = config.logo.symbolText;
            root.querySelector('.logo-text').textContent        = config.logo.logoText;
        }

        // ── Render Nav ──
        function renderNav() {
            var items    = config.navItems;
            var gnbInner = root.querySelector('.gnb-inner');
            var html     = '';

            for (var i = 0; i < items.length; i++) {
                var item     = items[i];
                var isActive = !!item.active;
                var tag      = isActive ? 'button' : 'div';
                var cls      = 'gnb-link' + (isActive ? ' gnb-link--active' : '');
                var textCls  = 'gnb-link-text' + (isActive ? ' gnb-link-text--active' : '');

                html += '<' + tag + ' class="' + cls + '" data-index="' + i + '">';
                html += '<span class="' + textCls + '">' + item.label + '</span>';
                if (isActive) {
                    html += '<div class="gnb-link-frame">'
                          + '<img src="assets/gnb-active-frame.svg" alt="">'
                          + '</div>';
                }
                html += '</' + tag + '>';
            }
            gnbInner.innerHTML = html;
        }

        // ── Render Toggle ──
        function renderToggle() {
            var items  = config.toggleItems;
            var toggle = root.querySelector('.toggle');
            var html   = '';

            for (var i = 0; i < items.length; i++) {
                var item     = items[i];
                var isActive = !!item.active;
                var stateCls = isActive ? 'btn-type-a--active' : 'btn-type-a--idle';

                html += '<div class="btn-type-a ' + stateCls + '" data-index="' + i + '">';
                html += '<span class="btn-type-a-text">' + item.label + '</span>';
                html += '</div>';
            }
            toggle.innerHTML = html;
        }

        // ── Render Circle Buttons ──
        function renderCircleButtons() {
            var items = config.circleButtons;
            var wrap  = root.querySelector('.btn-items');
            var html  = '';

            for (var i = 0; i < items.length; i++) {
                var item     = items[i];
                var isActive = !!item.active;
                var tag      = isActive ? 'button' : 'div';
                var stateCls = isActive ? 'btn-type-b--active' : 'btn-type-b--idle';
                var iconSrc  = isActive ? 'assets/btn-icon-active.svg' : 'assets/btn-icon-idle.svg';

                html += '<' + tag + ' class="btn-type-b ' + stateCls + '" data-id="' + item.id + '">';
                html += '<div class="btn-icon">';
                html += '<div class="btn-icon-inner">';
                html += '<img src="' + iconSrc + '" alt="">';
                html += '</div></div>';
                html += '</' + tag + '>';
            }
            wrap.innerHTML = html;
        }

        // ── Datetime ──
        function updateDatetime() {
            var now = new Date();
            var h   = now.getHours();
            var m   = now.getMinutes();
            var s   = now.getSeconds();
            var timeStr = h + '시 ' + String(m).padStart(2, '0') + '분 ' + String(s).padStart(2, '0') + '초';

            var y   = now.getFullYear();
            var mon = String(now.getMonth() + 1).padStart(2, '0');
            var d   = String(now.getDate()).padStart(2, '0');
            var dateStr = y + '.' + mon + '.' + d;

            root.querySelector('.datetime-time').textContent = timeStr;
            root.querySelector('.datetime-date').textContent = dateStr;
        }

        // ── Interactive handlers ──
        root.querySelector('.gnb-inner').addEventListener('click', function (e) {
            var link = e.target.closest('.gnb-link');
            if (!link) return;
            var idx = Number(link.dataset.index);
            if (isNaN(idx)) return;
            for (var i = 0; i < config.navItems.length; i++) {
                config.navItems[i].active = (i === idx);
            }
            renderNav();
        });

        root.querySelector('.toggle').addEventListener('click', function (e) {
            var btn = e.target.closest('.btn-type-a');
            if (!btn) return;
            var idx = Number(btn.dataset.index);
            if (isNaN(idx)) return;
            for (var i = 0; i < config.toggleItems.length; i++) {
                config.toggleItems[i].active = (i === idx);
            }
            renderToggle();
        });

        // ── Init ──
        window.onload = function () {
            renderLogo();
            renderNav();
            renderToggle();
            renderCircleButtons();
            updateDatetime();
            setInterval(updateDatetime, 1000);
        };
    </script>
</body>
</html>
