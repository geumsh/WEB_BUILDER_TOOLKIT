<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup - Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; font-family: 'Samsung Sharp Sans', 'Pretendard', sans-serif; padding: 40px; }

        /* ===== component.css (flattened) ===== */
        #popup-container { width: 1108px; height: 479px; overflow: hidden; position: relative; }
        #popup-container .popup-wrapper { width: 100%; height: 100%; position: relative; }
        #popup-container .panel { position: absolute; inset: 0; }
        #popup-container .panel img { display: block; width: 100%; height: 100%; }
        #popup-container .btn-bar { position: absolute; top: 0; left: 0; right: 0; height: 56px; display: flex; align-items: center; justify-content: flex-end; padding: 0 18px; border-radius: 20px 10px 0 0; z-index: 1; }
        #popup-container .btn-close { width: 24px; height: 24px; background: #333; border-radius: 6.5px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        #popup-container .btn-close img { display: block; width: 9px; height: 9px; }
        #popup-container .title-tab { position: absolute; top: 21.5px; left: 22px; display: flex; gap: 14px; align-items: center; z-index: 1; }
        #popup-container .title-icon { width: 20px; height: 21px; position: relative; }
        #popup-container .title-icon img { position: absolute; display: block; max-width: none; width: 100%; height: 100%; }
        #popup-container .title-text { font-family: 'Samsung Sharp Sans', 'Pretendard', sans-serif; font-weight: 700; font-size: 16px; line-height: 24px; color: #fff; white-space: nowrap; }
        #popup-container .contents { position: absolute; top: 80px; left: 24px; right: 24px; bottom: 20px; overflow: auto; }
        #popup-container .popup-table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; }
        #popup-container .popup-table thead th { font-family: 'Samsung Sharp Sans', 'Pretendard', sans-serif; font-weight: 500; font-size: 12px; line-height: normal; color: #fff; text-align: center; white-space: nowrap; padding: 9px 6px; background: rgba(84,84,84,0.75); border-bottom: none; }
        #popup-container .popup-table thead th:first-child { border-radius: 5px 0 0 0; }
        #popup-container .popup-table thead th:last-child { border-radius: 0 5px 0 0; }
        #popup-container .popup-table tbody td { font-family: 'Samsung Sharp Sans', 'Pretendard', sans-serif; font-weight: 400; font-size: 13px; line-height: 24px; color: #ccc; text-align: center; white-space: nowrap; padding: 2px 6px; border-bottom: 1px solid rgba(255,255,255,0.06); }

        .test-controls { margin-top: 20px; display: flex; gap: 8px; }
        .test-controls button { padding: 6px 14px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #e4ebf6; font-size: 12px; cursor: pointer; }
        .test-controls button:hover { border-color: #0068ff; }
    </style>
</head>
<body>
    <div id="popup-container">
        <div class="popup-wrapper">
            <div class="panel"><img src="./assets/38022d8532f27cac47dc8ab231f185669024ef66.svg" alt=""></div>
            <div class="btn-bar">
                <div class="btn-close"><img src="./assets/2b71b92f89860d8681ac5d344dafc1b1b34b62b8.svg" alt="close"></div>
            </div>
            <div class="title-tab">
                <div class="title-icon"><img src="./assets/980c6087a70a3503513e2245419774657a2f951a.svg" alt=""></div>
                <span class="title-text"></span>
            </div>
            <div class="contents">
                <table class="popup-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="test-controls">
        <button onclick="loadData()">Load Data</button>
        <button onclick="togglePopup()">Show/Hide</button>
    </div>

<script>
const container = document.getElementById('popup-container');
let visible = true;

function renderTable(data) {
    // Title
    container.querySelector('.title-text').textContent = data.title;

    // Header
    container.querySelector('.popup-table thead').innerHTML =
        '<tr>' + data.columns.map(c => `<th>${c}</th>`).join('') + '</tr>';

    // Body
    const tbody = container.querySelector('.popup-table tbody');
    tbody.innerHTML = data.rows.map(row =>
        '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>'
    ).join('');
}

function loadData() {
    renderTable({
        title: '테이블스페이스현황',
        columns: ['수집일시', '호스트명', '인스턴스명', '테이블스페이스명', '총용량(GB)', '남은용량(GB)', '사용율(%)'],
        rows: [
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '5', '95.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '12', '88.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '17', '83.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '20', '80.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '25', '75.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '28', '72.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '39', '61.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '41', '59.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '42', '58.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '44', '56.00%'],
            ['2025-06-08 13:00', '원앱 운영DB1', 'PIFP', 'PIFPDB01', '100', '46', '54.00%'],
        ],
    });
}

function togglePopup() {
    const wrapper = container.querySelector('.popup-wrapper');
    visible = !visible;
    wrapper.style.display = visible ? '' : 'none';
}

// Close button
container.querySelector('.btn-close').addEventListener('click', () => {
    container.querySelector('.popup-wrapper').style.display = 'none';
    visible = false;
});

loadData();
</script>
</body>
</html>
