<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataPlatform - Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; font-family: 'Pretendard', 'Samsung Sharp Sans', sans-serif; }

        /* ===== component.css (flattened) ===== */
        #data-platform-container { width: 552.61px; height: 582.76px; overflow: auto; }
        #data-platform-container .data-platform { position: relative; width: 552.61px; height: 582.76px; }
        #data-platform-container .data-platform-fill { position: absolute; top: 14px; left: 0; right: 0; bottom: 0; border-radius: 30px; background: rgba(9,9,9,0.4); box-shadow: inset 0px 4px 44px 0px rgba(0,0,0,0.7); }
        #data-platform-container .data-platform-title { position: absolute; top: 0; left: 13px; width: 127px; height: 26px; display: flex; align-items: center; justify-content: center; padding: 0 26px; border-radius: 0 0 10px 0; border-top-left-radius: 10px; background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 127 26' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'><rect x='0' y='0' height='100%25' width='100%25' fill='url(%23grad)' opacity='0.30000001192092896'/><defs><radialGradient id='grad' gradientUnits='userSpaceOnUse' cx='0' cy='0' r='10' gradientTransform='matrix(3.8883e-16 1.3 -6.35 7.9602e-17 63.5 13)'><stop stop-color='rgba(43,102,246,0.1)' offset='0'/><stop stop-color='rgba(43,102,246,1)' offset='1'/></radialGradient></defs></svg>"); background-size: 100% 100%; box-sizing: border-box; z-index: 1; }
        #data-platform-container .data-platform-title::after { content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; box-shadow: inset 0px 0px 1px 0px #2b66f6, inset 0px 0px 6px 0px rgba(43,102,246,0.6), inset 0px 0px 10px 0px rgba(43,102,246,0.7), inset 0px 0px 23px 0px rgba(43,102,246,0.5); }
        #data-platform-container .data-platform-title span { font-family: 'Samsung Sharp Sans', sans-serif; font-weight: 500; font-size: 13px; color: #fff; text-align: center; white-space: nowrap; line-height: normal; position: relative; z-index: 1; }
        #data-platform-container .data-platform-grid { position: absolute; top: 53.32px; left: 41.23px; width: 472.14px; display: flex; flex-direction: column; gap: 16px; }
        #data-platform-container .data-platform-row { display: flex; gap: 18px; align-items: center; }
        #data-platform-container .data-platform-cell { display: flex; flex-direction: column; gap: 6px; align-items: center; justify-content: center; width: 63.69px; height: 71px; flex-shrink: 0; position: relative; }
        #data-platform-container .cell-title { display: flex; gap: 4px; align-items: flex-start; width: 100%; flex-shrink: 0; position: relative; }
        #data-platform-container .cell-bullet { width: 5.69px; height: 6.259px; flex-shrink: 0; position: relative; }
        #data-platform-container .cell-bullet img { position: absolute; display: block; max-width: none; width: 100%; height: 100%; }
        #data-platform-container .cell-text { font-family: 'Pretendard', sans-serif; font-weight: 500; font-size: 10px; color: #cdcfd2; white-space: nowrap; line-height: 7px; flex-shrink: 0; position: relative; }
        #data-platform-container .cell-symbol { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
        #data-platform-container .symbol-body { position: absolute; top: 6.25%; left: 0; right: 29.17%; bottom: 0; }
        #data-platform-container .symbol-stack { position: absolute; top: 0; left: 0; right: 0; bottom: 0.73%; }
        #data-platform-container .symbol-item-bottom { position: absolute; top: 44.77%; left: 0; right: 0; bottom: 0; }
        #data-platform-container .symbol-item-bottom > img { display: block; position: absolute; top: 0; left: -3.14%; right: -3.14%; bottom: -3.68%; width: 106.28%; height: 103.68%; }
        #data-platform-container .symbol-item-middle { position: absolute; top: 22.39%; left: 0; right: 0; bottom: 22.39%; }
        #data-platform-container .symbol-item-middle > img { display: block; position: absolute; top: 0; left: -3.14%; right: -3.14%; bottom: -3.68%; width: 106.28%; height: 103.68%; }
        #data-platform-container .symbol-item-top { position: absolute; top: 0; left: 0; right: 0; bottom: 44.77%; }
        #data-platform-container .symbol-item-top > img { display: block; position: absolute; top: 0; left: -3.14%; right: -3.14%; bottom: -3.68%; width: 106.28%; height: 103.68%; }
        #data-platform-container .symbol-label { position: absolute; top: 1.59%; left: 1.89%; right: 27.35%; bottom: 78.71%; }
        #data-platform-container .symbol-label > img { display: block; position: absolute; width: 100%; height: 100%; }

        .test-controls { padding: 20px 30px; display: flex; gap: 8px; }
        .test-controls button { padding: 6px 14px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #e4ebf6; font-size: 12px; cursor: pointer; }
        .test-controls button:hover { border-color: #0068ff; }
    </style>
</head>
<body>
    <div id="data-platform-container">
        <div class="data-platform">
            <div class="data-platform-fill"></div>
            <div class="data-platform-title">
                <span>데이터 플랫폼</span>
            </div>
            <div class="data-platform-grid"></div>
        </div>
    </div>

    <div class="test-controls">
        <button onclick="loadData()">Load Data (34 instances)</button>
        <button onclick="loadPartial()">Load Partial (10 instances)</button>
    </div>

<script>
const container = document.getElementById('data-platform-container');
const COLS = 6;

function renderGrid(instances) {
    const gridEl = container.querySelector('.data-platform-grid');
    gridEl.innerHTML = '';

    const rows = [];
    for (let i = 0; i < instances.length; i += COLS) {
        rows.push(instances.slice(i, i + COLS));
    }

    rows.forEach(rowData => {
        const rowEl = document.createElement('div');
        rowEl.className = 'data-platform-row';

        rowData.forEach(inst => {
            const cell = document.createElement('div');
            cell.className = 'data-platform-cell';
            cell.innerHTML = `
                <div class="cell-title">
                    <div class="cell-bullet"><img src="./assets/bullet.svg" alt=""></div>
                    <div class="cell-text">${inst.name}</div>
                </div>
                <div class="cell-symbol">
                    <div class="symbol-body">
                        <div class="symbol-stack">
                            <div class="symbol-item-bottom"><img src="./assets/item-dark.svg" alt=""></div>
                            <div class="symbol-item-middle"><img src="./assets/item-highlight.svg" alt=""></div>
                            <div class="symbol-item-top"><img src="./assets/item-dark.svg" alt=""></div>
                        </div>
                    </div>
                    <div class="symbol-label"><img src="./assets/label.svg" alt=""></div>
                </div>
            `;
            rowEl.appendChild(cell);
        });

        gridEl.appendChild(rowEl);
    });
}

function loadData() {
    const types = ['oracle', 'mariadb', 'clickhouse', 'postgresql'];
    const instances = [];
    for (let i = 0; i < 34; i++) {
        instances.push({
            name: `CDB${Math.floor(i/6)+1} 운영${(i%6)+1}`,
            type: types[i % types.length],
        });
    }
    renderGrid(instances);
}

function loadPartial() {
    const instances = [];
    for (let i = 0; i < 10; i++) {
        instances.push({
            name: `DB서버 ${i+1}`,
            type: 'oracle',
        });
    }
    renderGrid(instances);
}

loadData();
</script>
</body>
</html>
