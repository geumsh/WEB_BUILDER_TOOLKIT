<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart - Preview (ECharts)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; font-family: 'Samsung Sharp Sans', sans-serif; }

        /* ===== component.css (flattened) ===== */
        #chart-container { width: 863px; height: 186px; overflow: auto; }
        #chart-container .chart-group { position: relative; width: 100%; height: 100%; }
        #chart-container .chart-title { position: absolute; top: 0; left: 0; height: 9px; display: flex; gap: 8px; align-items: center; }
        #chart-container .chart-title-bullet { width: 6px; height: 6px; flex-shrink: 0; position: relative; }
        #chart-container .chart-title-bullet img { position: absolute; display: block; max-width: none; width: 100%; height: 100%; }
        #chart-container .chart-title-txt { display: flex; gap: 3px; align-items: center; font-family: 'Samsung Sharp Sans', sans-serif; font-weight: 500; font-size: 13px; line-height: normal; color: #fff; text-align: center; white-space: nowrap; flex-shrink: 0; }
        #chart-container .chart-title-txt p { margin: 0; }
        #chart-container .chart-area { position: absolute; top: 30px; left: 0; width: 862px; height: 156px; }

        .test-controls { padding: 20px 30px; display: flex; gap: 8px; }
        .test-controls button { padding: 6px 14px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #e4ebf6; font-size: 12px; cursor: pointer; }
        .test-controls button:hover { border-color: #0068ff; }
    </style>
</head>
<body>
    <div id="chart-container">
        <div class="chart-group">
            <div class="chart-title">
                <div class="chart-title-bullet"><img src="./assets/bullet-title.svg" alt=""></div>
                <div class="chart-title-txt">
                    <p class="chart-title-name"></p>
                    <p class="chart-title-target"></p>
                </div>
            </div>
            <div class="chart-area"></div>
        </div>
    </div>

    <div class="test-controls">
        <button onclick="loadCpu()">CPU/메모리</button>
        <button onclick="loadDisk()">Disk I/O</button>
        <button onclick="loadSpike()">Spike 시뮬레이션</button>
    </div>

<script>
const container = document.getElementById('chart-container');
const chartEl = container.querySelector('.chart-area');
const chart = echarts.init(chartEl);

function buildOption(xLabels, seriesData, warningLine, infoLine) {
    const markLines = [];
    if (warningLine !== undefined) {
        markLines.push({
            yAxis: warningLine,
            lineStyle: { color: '#e8a838', type: 'dashed', width: 1 },
            label: { show: false },
        });
    }
    if (infoLine !== undefined) {
        markLines.push({
            yAxis: infoLine,
            lineStyle: { color: '#3b82f6', type: 'dashed', width: 1 },
            label: { show: false },
        });
    }

    return {
        grid: { top: 10, right: 30, bottom: 30, left: 45 },
        xAxis: {
            type: 'category', data: xLabels,
            axisLine: { show: false }, axisTick: { show: false },
            axisLabel: { color: '#cdcfd2', fontSize: 12, fontFamily: 'Samsung Sharp Sans, sans-serif' },
            splitLine: { show: false },
        },
        yAxis: {
            type: 'value', min: 0, max: 100, interval: 20,
            axisLine: { show: false }, axisTick: { show: false },
            axisLabel: { color: '#cdcfd2', fontSize: 12, fontFamily: 'Samsung Sharp Sans, sans-serif' },
            splitLine: { show: true, lineStyle: { color: '#333', type: 'dashed', width: 1 } },
        },
        series: [{
            type: 'line', data: seriesData, smooth: false, symbol: 'none',
            lineStyle: { color: '#e8a838', width: 1.5 },
            areaStyle: {
                color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [
                        { offset: 0, color: 'rgba(232,168,56,0.3)' },
                        { offset: 1, color: 'rgba(232,168,56,0.05)' },
                    ],
                },
            },
            markLine: { silent: true, symbol: 'none', data: markLines },
        }],
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(30,30,30,0.9)',
            borderColor: '#475569',
            textStyle: { color: '#e4ebf6', fontSize: 12 },
        },
    };
}

function renderChart(data) {
    container.querySelector('.chart-title-name').textContent = data.title;
    container.querySelector('.chart-title-target').textContent = data.target;
    chart.setOption(buildOption(data.xLabels, data.seriesData, data.warningLine, data.infoLine), true);
}

function loadCpu() {
    renderChart({
        title: 'CPU/메모리', target: '[CDB1 운영11]',
        xLabels: ['09:00','11:00','13:00','15:00','17:00','19:00','21:00','23:00','01:00','03:00','05:00','07:00'],
        seriesData: [8, 7, 6, 5, 5, 8, 12, 15, 10, 8, 7, 6],
        warningLine: 95, infoLine: 20,
    });
}

function loadDisk() {
    renderChart({
        title: 'Disk I/O', target: '[CDB2 운영03]',
        xLabels: ['00:00','02:00','04:00','06:00','08:00','10:00','12:00','14:00','16:00','18:00','20:00','22:00'],
        seriesData: [22, 18, 15, 12, 25, 45, 60, 55, 48, 30, 20, 18],
        warningLine: 80, infoLine: 30,
    });
}

function loadSpike() {
    renderChart({
        title: 'CPU/메모리', target: '[CDB3 운영05]',
        xLabels: ['09:00','11:00','13:00','15:00','17:00','19:00','21:00','23:00','01:00','03:00','05:00','07:00'],
        seriesData: [10, 12, 15, 10, 8, 35, 78, 92, 45, 20, 12, 8],
        warningLine: 95, infoLine: 20,
    });
}

loadCpu();
</script>
</body>
</html>
