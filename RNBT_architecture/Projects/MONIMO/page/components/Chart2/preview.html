<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart2 - Preview (ECharts Multi-line)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; font-family: 'Samsung Sharp Sans', sans-serif; }

        #chart2-container { width: 863px; height: 181px; overflow: auto; }
        #chart2-container .chart2-group { position: relative; width: 100%; height: 100%; }
        #chart2-container .chart2-head { position: absolute; top: 0; left: 0; right: 0; height: 25px; display: flex; align-items: flex-end; justify-content: space-between; }
        #chart2-container .chart2-title { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        #chart2-container .chart2-title-bullet { width: 6px; height: 6px; flex-shrink: 0; position: relative; }
        #chart2-container .chart2-title-bullet img { position: absolute; display: block; max-width: none; width: 100%; height: 100%; }
        #chart2-container .chart2-title-text { font-family: 'Samsung Sharp Sans', sans-serif; font-weight: 500; font-size: 13px; line-height: normal; color: #fff; white-space: nowrap; }
        #chart2-container .chart2-area { position: absolute; top: 37px; left: 0; width: 862px; height: 144px; }

        .test-controls { padding: 20px 30px; display: flex; gap: 8px; }
        .test-controls button { padding: 6px 14px; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: #e4ebf6; font-size: 12px; cursor: pointer; }
        .test-controls button:hover { border-color: #0068ff; }
    </style>
</head>
<body>
    <div id="chart2-container">
        <div class="chart2-group">
            <div class="chart2-head">
                <div class="chart2-title">
                    <div class="chart2-title-bullet"><img src="./assets/bullet-title.svg" alt=""></div>
                    <span class="chart2-title-text"></span>
                </div>
            </div>
            <div class="chart2-area"></div>
        </div>
    </div>

    <div class="test-controls">
        <button onclick="loadSession()">Active Session</button>
        <button onclick="loadTps()">TPS</button>
    </div>

<script>
const container = document.getElementById('chart2-container');
const chart = echarts.init(container.querySelector('.chart2-area'));

function buildOption(xLabels, seriesArr) {
    return {
        grid: { top: 10, right: 15, bottom: 25, left: 45 },
        xAxis: {
            type: 'category', data: xLabels,
            axisLine: { show: false }, axisTick: { show: false },
            axisLabel: { color: '#cdcfd2', fontSize: 12 },
            splitLine: { show: false },
        },
        yAxis: {
            type: 'value', min: 0, max: 100, interval: 20,
            axisLine: { show: false }, axisTick: { show: false },
            axisLabel: { color: '#cdcfd2', fontSize: 12 },
            splitLine: { show: true, lineStyle: { color: '#333', type: 'dashed', width: 1 } },
        },
        series: seriesArr.map(s => ({
            type: 'line', name: s.name, data: s.data, smooth: false, symbol: 'none',
            lineStyle: { color: s.color, width: 1.5 },
            itemStyle: { color: s.color },
        })),
        tooltip: {
            trigger: 'axis',
            backgroundColor: 'rgba(30,30,30,0.9)',
            borderColor: '#475569',
            textStyle: { color: '#e4ebf6', fontSize: 12 },
        },
    };
}

function render(data) {
    container.querySelector('.chart2-title-text').textContent = data.title;
    chart.setOption(buildOption(data.xLabels, data.series), true);
}

function loadSession() {
    render({
        title: 'Active Session(count)',        xLabels: ['09:00','11:00','13:00','15:00','17:00','19:00','21:00','23:00','01:00','03:00','05:00','07:00'],
        series: [
            { name: 'CDB1', color: '#ff4455', data: [35, 65, 60, 55, 40, 30, 35, 30, 55, 60, 65, 60] },
            { name: 'CDB2', color: '#3b82f6', data: [30, 35, 40, 38, 35, 40, 35, 30, 25, 28, 30, 28] },
            { name: 'CDB3', color: '#22c55e', data: [25, 20, 15, 10, 8, 20, 45, 15, 10, 12, 15, 18] },
            { name: 'CDB4', color: '#a855f7', data: [12, 10, 15, 12, 10, 18, 15, 12, 10, 12, 15, 12] },
            { name: 'CDB5', color: '#eab308', data: [8, 6, 5, 4, 5, 8, 6, 5, 4, 5, 6, 5] },
        ],
    });
}

function loadTps() {
    render({
        title: 'TPS(count/sec)',        xLabels: ['00:00','02:00','04:00','06:00','08:00','10:00','12:00','14:00','16:00','18:00','20:00','22:00'],
        series: [
            { name: 'Oracle', color: '#ff4455', data: [50, 30, 20, 15, 40, 70, 85, 90, 80, 60, 45, 55] },
            { name: 'MariaDB', color: '#22c55e', data: [20, 15, 10, 8, 25, 40, 50, 45, 35, 28, 22, 20] },
            { name: 'PostgreSQL', color: '#3b82f6', data: [15, 10, 8, 5, 18, 35, 42, 38, 30, 22, 18, 15] },
        ],
    });
}

loadSession();
</script>
</body>
</html>
