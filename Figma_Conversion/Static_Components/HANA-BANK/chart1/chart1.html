<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="chart1.css">
</head>
<body style="margin: 0; background: #0f1117;">
    <div id="chart1-container">
        <div class="block">
            <div class="group">
                <!-- Header -->
                <div class="header">
                    <div class="title">
                        <div class="title-icon">
                            <img src="./assets/a3c2ab6590a36270718937ec11e700f8f2584c7e.svg" alt="icon">
                        </div>
                        <span class="title-text">Throughput</span>
                    </div>
                    <div class="action">
                        <div class="btn active">
                            <span class="btn-text">tab01</span>
                        </div>
                        <div class="btn">
                            <span class="btn-text">tab02</span>
                        </div>
                        <div class="btn">
                            <span class="btn-text">tab03</span>
                        </div>
                        <div class="btn">
                            <span class="btn-text">tab04</span>
                        </div>
                    </div>
                </div>
                <!-- Box -->
                <div class="box">
                    <!-- Legend -->
                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-dot">
                                <img src="./assets/ec5e2085a193bf2ae5cea8069f903b4fbae5fd05.svg" alt="">
                            </div>
                            <span class="legend-text">PEAK 데이</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot">
                                <img src="./assets/112150dce648ccba0a80fd474e68247401c8ccc7.svg" alt="">
                            </div>
                            <span class="legend-text">금월 PEAK</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot">
                                <img src="./assets/2bad395db55a8ab814f8791715b89c9b079bfe6d.svg" alt="">
                            </div>
                            <span class="legend-text">금일</span>
                        </div>
                    </div>
                    <!-- Chart -->
                    <div class="chart">
                        <!-- Grid lines -->
                        <div class="chart-lines">
                            <img src="./assets/1178e674780e0d6d852a15c12da8953b4367004e.svg" alt="">
                        </div>
                        <!-- Y-axis -->
                        <div class="y-axis">
                            <p class="y-label-400">400</p>
                            <p class="y-label-200">200</p>
                            <p class="y-label-0">0</p>
                        </div>
                        <!-- X-axis -->
                        <div class="x-axis">
                            <p class="x-08">08:00</p>
                            <p class="x-09">09:00</p>
                            <p class="x-10">10:00</p>
                            <p class="x-11">11:00</p>
                            <p class="x-12">12:00</p>
                            <p class="x-13">13:00</p>
                            <p class="x-14">14:00</p>
                            <p class="x-15">15:00</p>
                            <p class="x-16">16:00</p>
                        </div>
                        <!-- Graph -->
                        <div class="graph">
                            <img src="./assets/92a0d62d3ebc1fd058bc61fa736f2ed26569ab37.svg" alt="">
                        </div>
                        <!-- Tooltip -->
                        <div class="tooltip">
                            <div class="tooltip-line"></div>
                            <div class="tooltip-dot">
                                <img src="./assets/c1c02568df3ea9c159fa7f0bcbeec3c62401cc13.svg" alt="">
                            </div>
                            <div class="tooltip-box">
                                <div class="tooltip-arrow">
                                    <img src="./assets/6bbda97b01f1d26e03430b406d466eb68bc4d987.svg" alt="">
                                </div>
                                <span class="tooltip-value">275</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="block-inner-shadow"></div>
        </div>
    </div>
</body>
</html>
