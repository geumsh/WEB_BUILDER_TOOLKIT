<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Header</title>
  <link rel="stylesheet" href="frame-header.css">
</head>
<body>
  <div id="component-container">
    <div class="header">
      <!-- Hana Logo -->
      <div class="hana-logo">
        <div class="logo-part logo-v1"><img src="./assets/bd340a540a26de2c0c47c2a1c2d0ed80ae2d169f.svg" alt=""></div>
        <div class="logo-part logo-v2"><img src="./assets/20afd5d772660f4ebe65f098073543ebb28ddd4a.svg" alt=""></div>
        <div class="logo-part logo-v3"><img src="./assets/ebfcae510adf53ac5f06c48a1ff1ea4f9c0cb50f.svg" alt=""></div>
        <div class="logo-part logo-v4"><img src="./assets/05bf394faa74254f03e79028db97bdd789445b78.svg" alt=""></div>
        <div class="logo-part logo-v5"><img src="./assets/2c91b83843d2319bac86d069279b4eec1319b065.svg" alt=""></div>
        <div class="logo-part logo-v6"><img src="./assets/c579151cb04befafe354a7cd4c5f130a0b60a76a.svg" alt=""></div>
        <div class="logo-part logo-v7"><img src="./assets/6437d3dbe980dda3d352cf5b7b748dd8366efee0.svg" alt=""></div>
      </div>

      <!-- GNB Navigation -->
      <div class="gnb">
        <div class="btn-gnb">
          <span class="btn-text">종합현황</span>
        </div>
        <div class="btn-gnb">
          <span class="btn-text">임원현황</span>
        </div>
        <div class="btn-gnb">
          <span class="btn-text">관리자현황</span>
        </div>
        <!-- Active button -->
        <div class="btn-gnb-active">
          <div class="btn-bg">
            <div class="btn-bg-solid"></div>
            <div class="btn-bg-gradient"></div>
          </div>
          <div class="btn-content">
            <span class="btn-text">시스템현황</span>
            <div class="btn-icon">
              <img src="./assets/e1871278b22da1080d53be256d6678d09a0ec9c9.svg" alt="">
            </div>
          </div>
          <div class="btn-border-overlay"></div>
        </div>
        <div class="btn-gnb">
          <span class="btn-text">이벤트현황</span>
        </div>
        <div class="btn-gnb">
          <span class="btn-text">상면관리</span>
        </div>
        <div class="btn-gnb">
          <span class="btn-text">운영관리</span>
        </div>
      </div>

      <!-- Time & Actions -->
      <div class="time-section">
        <div class="date-display">
          <span class="date-text">2025-00-00(수)</span>
          <span class="time-text">09:00:00</span>
        </div>
        <div class="action-buttons">
          <!-- Logout -->
          <div class="action-btn">
            <div class="icon-wrapper">
              <img class="icon-img logout-icon" src="./assets/34293ac75e74381de2c0ae9316d22d181deb7348.svg" alt="logout">
            </div>
          </div>
          <!-- User -->
          <div class="action-btn btn-user">
            <div class="icon-wrapper">
              <img class="icon-img" src="./assets/64a1831eed80a8ed563feb5105ee8f73b192cd1b.svg" alt="user">
            </div>
          </div>
          <!-- Settings -->
          <div class="action-btn">
            <div class="icon-wrapper">
              <img class="icon-img" src="./assets/ea7e6e5b1031c2d7eda89cb7f3fef70d065bf28b.svg" alt="settings">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
