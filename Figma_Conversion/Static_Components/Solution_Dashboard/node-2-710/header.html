<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header02</title>
    <link rel="stylesheet" href="./header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;">
    <div id="component-container">
        <div class="header">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo">
                    <div class="logo-symbol">
                        <span class="logo-symbol-text">E</span>
                    </div>
                    <span class="logo-text">eCOBIT</span>
                </div>
            </div>

            <!-- GNB -->
            <div class="gnb">
                <div class="gnb-inner">
                    <button class="gnb-link gnb-link--active">
                        <span class="gnb-link-text gnb-link-text--active">상면관리</span>
                        <div class="gnb-link-frame">
                            <img src="./assets/7cac33123c09dd03fd4ce0944f1eacf12ca2ee4f.svg" alt="">
                        </div>
                    </button>
                    <div class="gnb-link">
                        <span class="gnb-link-text">설비현황</span>
                    </div>
                    <div class="gnb-link">
                        <span class="gnb-link-text">대응절차</span>
                    </div>
                    <div class="gnb-link">
                        <span class="gnb-link-text">모의훈련</span>
                    </div>
                    <div class="gnb-link">
                        <span class="gnb-link-text">이력관리</span>
                    </div>
                </div>
                <div class="gnb-shadow"></div>
            </div>

            <!-- Info -->
            <div class="info">
                <div class="info-container">
                    <!-- Toggle -->
                    <div class="toggle">
                        <div class="btn-type-a btn-type-a--active">
                            <span class="btn-type-a-text">대시보드</span>
                        </div>
                        <div class="btn-type-a btn-type-a--idle">
                            <span class="btn-type-a-text">리포트</span>
                        </div>
                    </div>

                    <!-- Btn Items -->
                    <div class="btn-items">
                        <button class="btn-type-b btn-type-b--active">
                            <div class="btn-icon">
                                <div class="btn-icon-inner">
                                    <img src="./assets/9eea2870f6e522615fa8abf19699956c992bac29.svg" alt="">
                                </div>
                            </div>
                        </button>
                        <div class="btn-type-b btn-type-b--idle">
                            <div class="btn-icon">
                                <div class="btn-icon-inner">
                                    <img src="./assets/cd9edb5fb9120041f3078981471e29c48bcb7482.svg" alt="">
                                </div>
                            </div>
                        </div>
                        <div class="btn-type-b btn-type-b--idle">
                            <div class="btn-icon">
                                <div class="btn-icon-inner">
                                    <img src="./assets/cd9edb5fb9120041f3078981471e29c48bcb7482.svg" alt="">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="divider-wrap">
                        <div class="divider"></div>
                    </div>

                    <!-- DateTime -->
                    <div class="datetime">
                        <span class="datetime-time">16시 28분 38초</span>
                        <span class="datetime-date">2026.02.05</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
