<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breadcrumb</title>
    <link rel="stylesheet" href="./breadcrumb.css">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#1a1a2e;">
    <div id="component-container">
        <div class="breadcrumb">
            <div class="breadcrumb-box">
                <span class="breadcrumb-text">센터</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-text">본관</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-text">4층</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-text breadcrumb-text--active">전기실</span>
            </div>
        </div>
    </div>
</body>
</html>
