<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Buttons - System / Power</title>
  <link rel="stylesheet" href="view-buttons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
  <div id="component-container">
    <div class="view-buttons">

      <!-- Button 1: 계통도 (Active) -->
      <div class="view-btn active">
        <div class="tooltip"><span>계통도</span></div>
        <div class="btn-circle">
          <div class="btn-icon">
            <img src="./assets/icon-system.svg" alt="">
          </div>
        </div>
      </div>

      <!-- Button 2: 전력도 (Inactive) -->
      <div class="view-btn inactive">
        <div class="tooltip"><span>전력도</span></div>
        <div class="btn-circle">
          <div class="btn-icon">
            <img src="./assets/icon-power.svg" alt="">
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
