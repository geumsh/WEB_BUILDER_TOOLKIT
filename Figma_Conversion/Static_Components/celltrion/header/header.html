<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header</title>
    <link rel="stylesheet" href="header.css" />
  </head>
  <body>
    <div id="component-container">
      <div class="header">
        <!-- Left: Title -->
        <div class="header-left">
          <div class="header-title"></div>
        </div>
        <!-- Center: Navigation -->
        <div class="nav">
          <button class="nav-btn nav-btn--active">
            <span class="nav-btn-label">대시보드</span>
          </button>
          <button class="nav-btn">
            <span class="nav-btn-label">통합관제</span>
          </button>
          <button class="nav-btn nav-btn--wide">
            <span class="nav-btn-label">설비 및 자산관리</span>
          </button>
          <button class="nav-btn">
            <span class="nav-btn-label">이동자원</span>
          </button>
          <button class="nav-btn nav-btn--mid">
            <span class="nav-btn-label">안전 및 보안</span>
          </button>
        </div>
        <!-- Right: Icon Buttons -->
        <div class="header-right">
          <div class="icon-btn">
            <div class="icon-btn-img">
              <img src="./assets/icon-search.svg" alt="" />
            </div>
          </div>
          <div class="icon-btn icon-btn--bell">
            <div class="icon-btn-img">
              <img src="./assets/icon-bell.svg" alt="" />
            </div>
            <div class="notification-dot"></div>
          </div>
          <div class="icon-btn">
            <div class="icon-btn-img">
              <img src="./assets/icon-settings.svg" alt="" />
            </div>
          </div>
          <div class="icon-btn">
            <div class="icon-btn-img">
              <img src="./assets/icon-user.svg" alt="" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
