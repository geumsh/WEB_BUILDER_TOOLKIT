<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Equipment Status</title>
  <link rel="stylesheet" href="moving-equipment-status.css">
</head>
<body style="background: #0a0c10;">
  <div id="component-container">
    <div class="glass-card">
      <!-- Title -->
      <div class="meq-title">
        <div class="meq-head">
          <div class="meq-head-icon">
            <img src="./assets/icon-title.svg" alt="">
          </div>
          <p class="meq-head-text">이동설비현황</p>
        </div>
        <div class="meq-legends">
          <div class="meq-legend-item">
            <div class="meq-legend-dot">
              <img src="./assets/dot-green.svg" alt="">
            </div>
            <p class="meq-legend-text">운영</p>
          </div>
          <div class="meq-legend-item">
            <div class="meq-legend-dot">
              <img src="./assets/dot-yellow.svg" alt="">
            </div>
            <p class="meq-legend-text">대기</p>
          </div>
          <div class="meq-legend-item">
            <div class="meq-legend-dot">
              <img src="./assets/dot-red.svg" alt="">
            </div>
            <p class="meq-legend-text">고장</p>
          </div>
        </div>
      </div>
      <!-- Contents -->
      <div class="meq-contents">
        <!-- #01 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 7.281px;"></div>
              <div class="meq-bar--yellow" style="height: 7.281px;"></div>
              <div class="meq-bar--green" style="height: 42.439px;"></div>
            </div>
          </div>
          <p class="meq-label">#01</p>
        </div>
        <!-- #02 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 4.598px;"></div>
              <div class="meq-bar--yellow" style="height: 4.598px;"></div>
              <div class="meq-bar--green" style="height: 26.803px;"></div>
            </div>
          </div>
          <p class="meq-label">#02</p>
        </div>
        <!-- #03 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 4px;"></div>
              <div class="meq-bar--yellow" style="height: 12px;"></div>
              <div class="meq-bar--green" style="height: 46.161px;"></div>
            </div>
          </div>
          <p class="meq-label">#03</p>
        </div>
        <!-- #04 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 6.514px;"></div>
              <div class="meq-bar--yellow" style="height: 6.514px;"></div>
              <div class="meq-bar--green" style="height: 37.972px;"></div>
            </div>
          </div>
          <p class="meq-label">#04</p>
        </div>
        <!-- #05 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 8.175px;"></div>
              <div class="meq-bar--yellow" style="height: 15px;"></div>
              <div class="meq-bar--green" style="height: 41px;"></div>
            </div>
          </div>
          <p class="meq-label">#05</p>
        </div>
        <!-- #06 -->
        <div class="meq-item">
          <div class="meq-graph">
            <div class="meq-bar-stack">
              <div class="meq-bar--red" style="height: 4.598px;"></div>
              <div class="meq-bar--yellow" style="height: 4.598px;"></div>
              <div class="meq-bar--green" style="height: 26.803px;"></div>
            </div>
          </div>
          <p class="meq-label">#06</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
