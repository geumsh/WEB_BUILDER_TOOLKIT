<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="chart2.css">
</head>
<body style="margin: 0; background: #0f1117;">
    <div id="chart2-container">
        <div class="block">
            <!-- Header -->
            <div class="header">
                <div class="title">
                    <div class="title-icon">
                        <img src="./assets/a3c2ab6590a36270718937ec11e700f8f2584c7e.svg" alt="icon">
                    </div>
                    <span class="title-text">시간대별 거래추이</span>
                </div>
                <div class="action">
                    <div class="btn active">
                        <span class="btn-text">전체</span>
                    </div>
                    <div class="btn">
                        <span class="btn-text">상품</span>
                    </div>
                    <div class="btn">
                        <span class="btn-text">1Q</span>
                    </div>
                </div>
            </div>
            <!-- Container -->
            <div class="container">
                <!-- Contents -->
                <div class="contents">
                    <!-- Date -->
                    <div class="date-row">
                        <div class="date-box">
                            <span class="date-label">PEAK일</span>
                            <span class="date-value">2025/08/05</span>
                        </div>
                    </div>
                    <!-- Chart -->
                    <div class="chart">
                        <!-- Grid lines -->
                        <div class="chart-lines">
                            <img src="./assets/3de234349e60eefeea86fcb0a4cf7a37b7777dce.svg" alt="">
                        </div>
                        <!-- Y-axis -->
                        <div class="y-axis">
                            <p>1,800</p>
                            <p>1,200</p>
                            <p>600</p>
                            <p>0</p>
                        </div>
                        <!-- X-axis -->
                        <div class="x-axis">
                            <p>00</p>
                            <p>02</p>
                            <p>04</p>
                            <p>06</p>
                            <p>08</p>
                            <p>10</p>
                            <p>12</p>
                            <p>14</p>
                            <p>16</p>
                            <p>18</p>
                            <p>20</p>
                            <p>22</p>
                        </div>
                        <!-- Graph -->
                        <div class="graph">
                            <img src="./assets/55dc2e0f44fc98d4232e21ed79f18097e46ddfd4.svg" alt="">
                        </div>
                        <!-- Tooltip -->
                        <div class="tooltip">
                            <div class="tooltip-line"></div>
                            <div class="tooltip-dot">
                                <img src="./assets/9fc115f6e11a2fa31cebdcceef77d42a7a9bf817.svg" alt="">
                            </div>
                            <div class="tooltip-box">
                                <div class="tooltip-arrow">
                                    <img src="./assets/6bbda97b01f1d26e03430b406d466eb68bc4d987.svg" alt="">
                                </div>
                                <span class="tooltip-value">600</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Legend -->
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot">
                            <img src="./assets/6582e363ebdeb6ef301c08a427d846c9eff21738.svg" alt="">
                        </div>
                        <span class="legend-text">역대픽</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot">
                            <img src="./assets/4bd0e9c081959dfca0c8712da85e3e0a909a40e5.svg" alt="">
                        </div>
                        <span class="legend-text">연중최고픽</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot">
                            <img src="./assets/2b30451c252bc6865bc225cb9cd644a17016d5ca.svg" alt="">
                        </div>
                        <span class="legend-text">월픽</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot">
                            <img src="./assets/2c2dd76bc73f9ef018dcd3512dcab9405677c4f4.svg" alt="">
                        </div>
                        <span class="legend-text">전일</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot">
                            <img src="./assets/0bab546aa314aee00bffde556ab6f82c4ada6bed.svg" alt="">
                        </div>
                        <span class="legend-text">금일</span>
                    </div>
                    <div class="legend-inner-shadow"></div>
                </div>
            </div>
            <div class="block-inner-shadow"></div>
        </div>
    </div>
</body>
</html>
