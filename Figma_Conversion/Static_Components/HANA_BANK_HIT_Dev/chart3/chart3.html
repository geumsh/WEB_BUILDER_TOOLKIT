<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="chart3.css">
</head>
<body style="margin: 0; background: #0f1117;">
    <div id="chart3-container">
        <div class="block">
            <!-- Header -->
            <div class="header">
                <div class="title">
                    <div class="title-icon">
                        <img src="./assets/a3c2ab6590a36270718937ec11e700f8f2584c7e.svg" alt="icon">
                    </div>
                    <span class="title-text">백업현황</span>
                </div>
            </div>
            <!-- Content -->
            <div class="frame">
                <!-- Pie Chart -->
                <div class="pie-chart">
                    <img src="./assets/c25363b37345ee4fed0102736627982edf8e77e3.svg" alt="pie chart">
                </div>
                <!-- Info Panel -->
                <div class="info-panel">
                    <!-- Title: 전체 10,607 -->
                    <div class="info-title">
                        <div class="info-label">
                            <span class="info-label-text">전체</span>
                        </div>
                        <div class="info-total">
                            <span class="info-total-value">10,607</span>
                        </div>
                    </div>
                    <!-- Legend List -->
                    <div class="legend-list">
                        <!-- 성공 -->
                        <div class="legend-row">
                            <div class="legend-tag">
                                <div class="legend-dot">
                                    <img src="./assets/a05376e26db5fa16db4c1149ea233a0e850b6e9e.svg" alt="">
                                </div>
                                <span class="legend-name">성공</span>
                            </div>
                            <div class="legend-badge">
                                <span class="legend-badge-value">123</span>
                            </div>
                        </div>
                        <!-- 진행중 -->
                        <div class="legend-row">
                            <div class="legend-tag">
                                <div class="legend-dot">
                                    <img src="./assets/726a9ce244586c3e01ff1aa24fd8e6acd24ff669.svg" alt="">
                                </div>
                                <span class="legend-name">진행중</span>
                            </div>
                            <div class="legend-badge">
                                <span class="legend-badge-value">1,123</span>
                            </div>
                        </div>
                        <!-- 실패 -->
                        <div class="legend-row">
                            <div class="legend-tag">
                                <div class="legend-dot">
                                    <img src="./assets/55f370d887c4878c8503f8689ab30a36ea03d27b.svg" alt="">
                                </div>
                                <span class="legend-name">실패</span>
                            </div>
                            <div class="legend-badge">
                                <span class="legend-badge-value">8</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="block-inner-shadow"></div>
        </div>
    </div>
</body>
</html>
