<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chart.css">
    <title>Chart</title>
</head>
<body style="margin: 0; background: #1a1a1a;">
<div id="chart-container">
    <div class="chart-group">
        <!-- 타이틀 -->
        <div class="chart-title">
            <div class="chart-title-bullet"><img src="./assets/bullet-title.svg" alt=""></div>
            <div class="chart-title-txt">
                <p>CPU/메모리</p>
                <p>[CDB1 운영11]</p>
            </div>
        </div>

        <!-- 차트 -->
        <div class="chart">
            <div class="chart-bg"><img src="./assets/chart-bg.svg" alt=""></div>

            <div class="chart-y-axis">
                <p>100</p>
                <p>80</p>
                <p>60</p>
                <p>40</p>
                <p>20</p>
                <p>0</p>
            </div>

            <div class="chart-grid-lines"><img src="./assets/group-line.svg" alt=""></div>

            <div class="chart-graph">
                <div class="chart-graph-inner"><img src="./assets/graph.svg" alt=""></div>
            </div>

            <div class="chart-x-axis">
                <div class="chart-x-label">09:00</div>
                <div class="chart-x-label">11:00</div>
                <div class="chart-x-label">13:00</div>
                <div class="chart-x-label">15:00</div>
                <div class="chart-x-label">17:00</div>
                <div class="chart-x-label">19:00</div>
                <div class="chart-x-label">21:00</div>
                <div class="chart-x-label">23:00</div>
                <div class="chart-x-label">01:00</div>
                <div class="chart-x-label">03:00</div>
                <div class="chart-x-label">05:00</div>
                <div class="chart-x-label">07:00</div>
            </div>

            <div class="chart-btn-plus">
                <div class="chart-btn-plus-icon"><img src="./assets/icon-plus.svg" alt=""></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
