<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chart3.css">
    <title>Chart3</title>
</head>
<body style="margin: 0; background: #1a1a1a;">
<div id="chart3-container">
    <div class="chart3-group">
        <!-- 타이틀 -->
        <div class="chart3-title">
            <div class="chart3-title-bullet"><img src="./assets/bullet-title.svg" alt=""></div>
            <span class="chart3-title-text">Logical Read(Blocks)</span>
        </div>

        <!-- 차트 -->
        <div class="chart3">
            <div class="chart3-bg"><img src="./assets/chart-bg.svg" alt=""></div>

            <div class="chart3-y-axis">
                <p>2.2</p>
                <p>2</p>
                <p>1.2</p>
                <p>1.0</p>
            </div>

            <div class="chart3-grid-lines">
                <div class="chart3-grid-lines-inner"><img src="./assets/grid-lines.svg" alt=""></div>
            </div>

            <div class="chart3-graph">
                <div class="chart3-graph-inner"><img src="./assets/graph.svg" alt=""></div>
            </div>

            <div class="chart3-x-axis">
                <p>15:00:00</p>
                <p>15:10:00</p>
                <p>15:20:00</p>
            </div>

            <div class="chart3-legend">
                <div class="chart3-legend-item">
                    <div class="chart3-legend-bullet blue"></div>
                    <span class="chart3-legend-label">1.85</span>
                </div>
                <div class="chart3-legend-item">
                    <div class="chart3-legend-bullet green"></div>
                    <span class="chart3-legend-label">1.81</span>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
