<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chart2.css">
    <title>Chart2</title>
</head>
<body style="margin: 0; background: #1a1a1a;">
<div id="chart2-container">
    <div class="chart2-group">
        <!-- 헤더 -->
        <div class="chart2-head">
            <div class="chart2-title">
                <div class="chart2-title-bullet"><img src="./assets/bullet-title.svg" alt=""></div>
                <span class="chart2-title-text">Active Session(count)</span>
            </div>
            <div class="chart2-btn-popup">
                <span>TableSpace</span>
            </div>
        </div>

        <!-- 차트 -->
        <div class="chart2">
            <div class="chart2-bg"><img src="./assets/chart-bg.svg" alt=""></div>

            <div class="chart2-y-axis">
                <p>100</p>
                <p>80</p>
                <p>60</p>
                <p>40</p>
                <p>20</p>
                <p>0</p>
            </div>

            <div class="chart2-grid-lines"><img src="./assets/group-line.svg" alt=""></div>

            <div class="chart2-graph">
                <div class="chart2-line-green"><img src="./assets/green.svg" alt=""></div>
                <div class="chart2-line-blue"><img src="./assets/blue.svg" alt=""></div>
                <div class="chart2-line-red"><img src="./assets/red.svg" alt=""></div>
                <div class="chart2-line-purple"><img src="./assets/purple.svg" alt=""></div>
                <div class="chart2-line-yellow"><img src="./assets/yellow.svg" alt=""></div>
            </div>

            <div class="chart2-x-axis">
                <div class="chart2-x-label">09:00</div>
                <div class="chart2-x-label">11:00</div>
                <div class="chart2-x-label">13:00</div>
                <div class="chart2-x-label">15:00</div>
                <div class="chart2-x-label">17:00</div>
                <div class="chart2-x-label">19:00</div>
                <div class="chart2-x-label">21:00</div>
                <div class="chart2-x-label">23:00</div>
                <div class="chart2-x-label">01:00</div>
                <div class="chart2-x-label">03:00</div>
                <div class="chart2-x-label">05:00</div>
                <div class="chart2-x-label">07:00</div>
            </div>

            <div class="chart2-btn-plus">
                <div class="chart2-btn-plus-icon"><img src="./assets/icon-plus.svg" alt=""></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
