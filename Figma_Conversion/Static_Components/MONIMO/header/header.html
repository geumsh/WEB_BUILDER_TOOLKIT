<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MONIMO Header</title>
    <link rel="stylesheet" href="header.css" />
  </head>
  <body style="margin: 0; background: #121212">
    <div id="header-container">
      <div class="header">
        <div class="header-bg"></div>
        <div class="gnb">
          <!-- CI -->
          <div class="ci">
            <span class="ci-text">통합대시보드</span>
          </div>
          <!-- Menu -->
          <div class="menu">
            <div class="menu-item">
              <span class="menu-item-text">종합현황</span>
            </div>
            <div class="menu-item">
              <span class="menu-item-text">비지니스현황</span>
            </div>
            <div class="menu-item active">
              <span class="menu-item-text">인프라현황</span>
              <div class="menu-item-glow"></div>
            </div>
            <div class="menu-item">
              <span class="menu-item-text">IT운영관리</span>
            </div>
          </div>
          <!-- Info -->
          <div class="info">
            <div class="user-name">
              <div class="user-icon">
                <img src="./assets/user.svg" alt="user" />
              </div>
              <span class="user-name-text">
                <span class="name">홍길동</span>
                <span class="suffix">님</span>
              </span>
            </div>
            <div class="info-group">
              <div class="day">
                <div class="date-col">
                  <p>2025/01/06</p>
                  <p>Mon</p>
                </div>
                <span class="time-text">17:35:15</span>
              </div>
              <div class="btn-logout">
                <img src="./assets/logout.svg" alt="logout" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
