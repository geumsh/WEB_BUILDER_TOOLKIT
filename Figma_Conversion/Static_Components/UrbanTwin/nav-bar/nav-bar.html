<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanTwin Nav Bar</title>
  <link rel="stylesheet" href="nav-bar.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&family=Noto+Sans+KR:wght@500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="nav-bar-container">
    <div class="nav-bar">
      <!-- BI (Logo) -->
      <div class="bi">
        <img class="logo-icon" src="./assets/logo-icon.svg" alt="UrbanTwin Logo" />
        <span class="logo-text">UrbanTwin</span>
      </div>

      <!-- Search Input -->
      <div class="search-wrapper">
        <img class="search-icon" src="./assets/search-icon.svg" alt="Search" />
        <input type="text" class="search-input" placeholder="위치 검색..." />
      </div>

      <!-- Top Navigation Buttons -->
      <div class="nav-buttons">
        <!-- Icon Buttons -->
        <div class="icon-buttons">
          <img class="icon-btn" src="./assets/btn-home.svg" alt="Home" />
          <img class="icon-btn" src="./assets/btn-cart.svg" alt="Cart" />
          <img class="icon-btn" src="./assets/btn-notification.svg" alt="Notification" />
        </div>

        <!-- Text Buttons -->
        <div class="text-buttons">
          <button class="btn-advertise">광고하기</button>
          <button class="btn-mypage">마이페이지</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
